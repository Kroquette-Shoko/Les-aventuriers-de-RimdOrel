<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Spellcraft — Test serveur (visuel)</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Inter:wght@400;600;700&display=swap');
:root{
  --bg:#0b0a12; --panel:#171325; --panel2:#1f1a30; --gold:#d4af37; --parchment:#efe6c8;
  --dim:#9d92b0; --blood:#c23b3b; --green:#4a9d6b; --arcane:#7c5cff;
}
*{box-sizing:border-box;}
body{background:var(--bg);color:var(--parchment);font-family:'Inter',sans-serif;margin:0;padding:14px;}
h1{font-family:'Cinzel',serif;color:var(--gold);font-size:18px;margin:0 0 8px;}
.setup-panel{background:var(--panel);border:1px solid #3a3260;border-radius:10px;padding:12px;margin-bottom:12px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
input{background:var(--panel2);border:1px solid #3a3260;color:var(--parchment);border-radius:6px;padding:7px 10px;font-size:12.5px;}
button{background:var(--arcane);color:#fff;border:none;border-radius:6px;padding:8px 14px;font-size:12.5px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;}
button:hover{filter:brightness(1.15);}
button.secondary{background:var(--panel2);border:1px solid #3a3260;}
button:disabled{opacity:.4;cursor:not-allowed;}
code{background:#0b0a12;padding:1px 5px;border-radius:4px;font-size:11px;}

#session-code-display{font-family:'Cinzel',serif;font-weight:700;color:var(--gold);font-size:20px;letter-spacing:4px;}

.board-wrap{display:none;}
.board-wrap.show{display:block;}

.player-row{background:var(--panel);border:1px solid #3a3260;border-radius:10px;padding:10px 14px;margin-bottom:8px;}
.player-row.active-turn{border-color:var(--gold);}
.player-head{display:flex;align-items:center;gap:14px;margin-bottom:8px;font-size:12.5px;}
.player-head .name{font-family:'Cinzel',serif;font-weight:700;color:var(--gold);}
.stat{background:var(--panel2);border-radius:14px;padding:3px 10px;}
.hp{color:var(--blood);}
.mana{color:#6fd0ff;}

.zone-label{font-size:10px;text-transform:uppercase;color:var(--dim);letter-spacing:.5px;margin:6px 0 4px;}
.card-row{display:flex;gap:8px;flex-wrap:wrap;min-height:70px;}

.mini-card{width:86px;background:#f7f2e2;color:#231d33;border-radius:8px;border:2.5px solid #8a7f6a;padding:4px 5px;font-size:9.5px;cursor:pointer;position:relative;user-select:none;transition:transform .1s;}
.mini-card:hover{transform:translateY(-4px);}
.mini-card.selected{border-color:var(--gold);box-shadow:0 0 0 2px var(--gold);}
.mini-card.disabled{opacity:.4;cursor:not-allowed;}
.mini-card.disabled:hover{transform:none;}
.mini-card .mc-name{font-family:'Cinzel',serif;font-weight:700;text-align:center;line-height:1.15;min-height:24px;margin-bottom:3px;}
.mini-card .mc-cost{position:absolute;top:-6px;left:-6px;width:18px;height:18px;border-radius:50%;background:#155a94;color:#fff;font-weight:700;font-size:9px;display:flex;align-items:center;justify-content:center;border:1.5px solid #0c2b45;}
.mini-card .mc-stats{display:flex;justify-content:space-between;font-weight:700;}
.mini-card .mc-atk{color:var(--blood);}
.mini-card .mc-hp{color:var(--green);}
.mini-card .mc-kw{font-size:7.5px;color:#5a4f3f;text-align:center;margin-top:2px;line-height:1.1;}

.phase-actions{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0;padding:10px;background:var(--panel2);border-radius:8px;}
.phase-status{font-size:12px;color:var(--dim);}

#log{font-size:11px;color:var(--dim);max-height:130px;overflow-y:auto;background:var(--panel);border:1px solid #2b2440;padding:8px;border-radius:6px;margin-top:12px;}
.log-line{margin-bottom:2px;}
.log-error{color:var(--blood);}
.log-ok{color:var(--green);}

#chat-box{display:flex;gap:6px;margin-top:6px;}
#chat-log{font-size:11.5px;color:var(--dim);max-height:110px;overflow-y:auto;background:var(--panel);border:1px solid #2b2440;padding:8px;border-radius:6px;margin-top:8px;}
</style>
</head>
<body>

<h1>🧪 Test serveur — plateau visuel</h1>
<div id="sc-auth-slot" style="margin-bottom:10px;"></div>

<div class="setup-panel">
  <button onclick="uiCreateVsAI()">Créer contre l'IA</button>
  <button class="secondary" onclick="uiCreateForFriend()">Créer (attendre un ami)</button>
  <span>ou</span>
  <input id="join-code-input" placeholder="Code à 6 caractères" maxlength="6" style="text-transform:uppercase;">
  <button class="secondary" onclick="uiJoinAsPlayer()">Rejoindre</button>
  <button class="secondary" onclick="uiJoinAsSpectator()">Regarder</button>
  <span id="session-code-display"></span>
</div>

<div class="board-wrap" id="board-wrap">

  <div class="player-row" id="row-opponent">
    <div class="player-head">
      <span class="name" id="opp-name">Adversaire</span>
      <span class="stat hp">❤ <span id="opp-hp">–</span></span>
      <span class="stat mana">💧 <span id="opp-mana">–</span></span>
    </div>
    <div class="zone-label">Plateau</div>
    <div class="card-row" id="opp-board"></div>
    <div class="zone-label">Main (<span id="opp-hand-count">0</span> cartes cachées)</div>
  </div>

  <div class="phase-actions" id="phase-actions"></div>
  <div class="phase-status" id="phase-status"></div>

  <div class="player-row active-turn" id="row-me">
    <div class="player-head">
      <span class="name" id="me-name">Moi</span>
      <span class="stat hp">❤ <span id="me-hp">–</span></span>
      <span class="stat mana">💧 <span id="me-mana">–</span></span>
    </div>
    <div class="zone-label">Plateau</div>
    <div class="card-row" id="me-board"></div>
    <div class="zone-label">Main</div>
    <div class="card-row" id="me-hand"></div>
  </div>

  <div id="chat-log"></div>
  <div id="chat-box">
    <input id="chat-input" placeholder="Message..." style="flex:1;">
    <button class="secondary" onclick="uiSendChat()">Envoyer</button>
  </div>
</div>

<div id="log"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="spellcraft-shared.js"></script>
<script src="spellcraft-auth.js"></script>
<script src="spellcraft-server-client.js"></script>
<script>

const KW_LABELS = {
  armor:'Armure', toxic:'Toxique', lifesteal:'Vol de vie', pierce:'Perçant',
  initiative:'Initiative', flying:'Vol', reach:'Portée', fearful:'Peureux',
  protecteur:'Protecteur', relentless:'Tenace', charge:'Charge'
};

const TEST_DECK = {
  hero: { name: 'Héros de test', hp: 30 },
  cards: [
    { id:'t1', name:'Sans mot-clé', type:'Créature', cost:1, atk:1, hp:1, keywords:[] },
    { id:'t2', name:'Armure', type:'Créature', cost:2, atk:2, hp:2, keywords:['armor'] },
    { id:'t3', name:'Toxique', type:'Créature', cost:2, atk:1, hp:2, keywords:['toxic'] },
    { id:'t4', name:'Vol de vie', type:'Créature', cost:2, atk:2, hp:2, keywords:['lifesteal'] },
    { id:'t5', name:'Perçant', type:'Créature', cost:2, atk:3, hp:2, keywords:['pierce'] },
    { id:'t6', name:'Initiative', type:'Créature', cost:2, atk:2, hp:1, keywords:['initiative'] },
    { id:'t7', name:'Vol', type:'Créature', cost:2, atk:2, hp:2, keywords:['flying'] },
    { id:'t8', name:'Portée', type:'Créature', cost:2, atk:2, hp:2, keywords:['reach'] },
    { id:'t9', name:'Peureux', type:'Créature', cost:1, atk:2, hp:1, keywords:['fearful'] },
    { id:'t10', name:'Protecteur', type:'Créature', cost:2, atk:1, hp:6, keywords:['protecteur'] },
    { id:'t11', name:'Tenace', type:'Créature', cost:3, atk:2, hp:2, keywords:['relentless'] },
    { id:'t12', name:'Charge', type:'Créature', cost:2, atk:2, hp:2, keywords:['charge'] }
  ]
};

let LAST_STATE = null;
let MY_KEY = null, OPP_KEY = null;
let SELECTING_ATTACKERS = false;
let SELECTED_ATTACKER_IDS = [];
let SELECTED_BLOCKER_ID = null;

function logLine(msg, cls){
  const el = document.getElementById('log');
  const line = document.createElement('div');
  line.className = 'log-line ' + (cls||'');
  line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
  el.prepend(line);
}
function showResult(label, res){
  if(res && res.error){ logLine(`${label} → ${res.error}`, 'log-error'); }
  else logLine(`${label} → ok`, 'log-ok');
  return res;
}

// ---------------- Connexion / session ----------------

async function uiCreateVsAI(){
  const res = await gsCreateSession(TEST_DECK, true);
  if(res.error) return logLine('Créer → ' + res.error, 'log-error');
  afterConnected(res.code);
}
async function uiCreateForFriend(){
  const res = await gsCreateSession(TEST_DECK, false);
  if(res.error) return logLine('Créer → ' + res.error, 'log-error');
  afterConnected(res.code);
}
async function uiJoinAsPlayer(){
  const code = document.getElementById('join-code-input').value.trim().toUpperCase();
  const res = await gsJoinAsPlayer(code, TEST_DECK);
  if(res.error) return logLine('Rejoindre → ' + res.error, 'log-error');
  afterConnected(code);
}
async function uiJoinAsSpectator(){
  const code = document.getElementById('join-code-input').value.trim().toUpperCase();
  const res = await gsJoinAsSpectator(code);
  if(res.error) return logLine('Regarder → ' + res.error, 'log-error');
  afterConnected(code);
}

function afterConnected(code){
  document.getElementById('session-code-display').textContent = code || '';
  document.getElementById('board-wrap').classList.add('show');
  MY_KEY = GS_ROLE === 'p2' ? 'p2' : 'p1';
  OPP_KEY = MY_KEY === 'p1' ? 'p2' : 'p1';
  gsConnect(onStateUpdate, onChatMessage);
  logLine('Connecté (rôle : ' + GS_ROLE + ')', 'log-ok');
  // la création/rejointe ne diffuse rien elle-même : on va chercher
  // l'état initial nous-mêmes plutôt que d'attendre une diffusion.
  gsFetchState().then(res=>{
    if(res.error){ logLine('État initial → ' + res.error, 'log-error'); return; }
    onStateUpdate(res.state);
  });
}

// ---------------- Rendu ----------------

function onStateUpdate(state){
  if(!state || !state.p1){
    logLine('En attente d\'un adversaire pour démarrer la partie...', 'log-ok');
    return;
  }
  LAST_STATE = state;
  render();
}

function cardHtml(c){
  const kwLine = (c.keywords||[]).map(k=>KW_LABELS[k]||k).join(', ');
  return `
    <div class="mc-cost">${c.cost ?? ''}</div>
    <div class="mc-name">${escapeHtmlUI(c.name||'')}</div>
    <div class="mc-stats"><span class="mc-atk">⚔${c.curAtk ?? c.atk ?? 0}</span><span class="mc-hp">♥${c.curHp ?? c.hp ?? 0}</span></div>
    ${kwLine ? `<div class="mc-kw">${escapeHtmlUI(kwLine)}</div>` : ''}
  `;
}
function escapeHtmlUI(s){ return (s||'').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

function render(){
  if(!LAST_STATE || !MY_KEY) return;
  const S = LAST_STATE;
  const me = S[MY_KEY], opp = S[OPP_KEY];
  const myTurn = S.active === MY_KEY;

  document.getElementById('me-name').textContent = myTurn ? 'Moi (à mon tour)' : 'Moi';
  document.getElementById('opp-name').textContent = S.active === OPP_KEY ? 'Adversaire (à son tour)' : 'Adversaire';
  document.getElementById('me-hp').textContent = me.hp;
  document.getElementById('opp-hp').textContent = opp.hp;
  document.getElementById('me-mana').textContent = `${me.manaNormal}/${me.manaNormalMax}`;
  document.getElementById('opp-mana').textContent = `${opp.manaNormal}/${opp.manaNormalMax}`;
  document.getElementById('opp-hand-count').textContent = (opp.hand||[]).length;
  document.getElementById('row-me').classList.toggle('active-turn', myTurn);
  document.getElementById('row-opponent').classList.toggle('active-turn', !myTurn);

  const oppBoardEl = document.getElementById('opp-board');
  oppBoardEl.innerHTML = '';
  (opp.board||[]).forEach(c=>{
    const el = document.createElement('div');
    el.className = 'mini-card';
    el.innerHTML = cardHtml(c);
    if(S.phase==='declareBlockersMe' && S.active===OPP_KEY && SELECTED_BLOCKER_ID && (opp.attackers||[]).includes(c.instId)){
      el.onclick = ()=>uiAssignBlock(c.instId);
    }
    oppBoardEl.appendChild(el);
  });

  const meBoardEl = document.getElementById('me-board');
  meBoardEl.innerHTML = '';
  (me.board||[]).forEach(c=>{
    const el = document.createElement('div');
    el.className = 'mini-card';
    if(SELECTED_ATTACKER_IDS.includes(c.instId)) el.classList.add('selected');
    if(c.instId===SELECTED_BLOCKER_ID) el.classList.add('selected');
    el.innerHTML = cardHtml(c);
    if(SELECTING_ATTACKERS && !c.summonSick && !c.keywords?.includes('protecteur')){
      el.onclick = ()=>uiToggleAttacker(c.instId);
    } else if(S.phase==='declareBlockersMe' && S.active===OPP_KEY && !c.hasBlockedThisTurn && !c.keywords?.includes('fearful')){
      el.onclick = ()=>{ SELECTED_BLOCKER_ID = c.instId; render(); };
    }
    meBoardEl.appendChild(el);
  });

  const handEl = document.getElementById('me-hand');
  handEl.innerHTML = '';
  (me.hand||[]).forEach((c,i)=>{
    const el = document.createElement('div');
    el.className = 'mini-card';
    const affordable = (c.cost||0) <= (me.manaNormal + me.manaFragile);
    if(!(myTurn && S.phase==='main' && affordable)) el.classList.add('disabled');
    el.innerHTML = cardHtml(c);
    if(myTurn && S.phase==='main' && affordable) el.onclick = ()=>uiPlayCard(i);
    handEl.appendChild(el);
  });

  renderPhaseActions(S, myTurn);
}

function renderPhaseActions(S, myTurn){
  const el = document.getElementById('phase-actions');
  const statusEl = document.getElementById('phase-status');
  el.innerHTML = '';
  statusEl.textContent = '';

  if(S.gameOver){
    statusEl.textContent = `Partie terminée — victoire de ${S.winnerKey===MY_KEY ? 'moi' : (S.winnerKey===OPP_KEY?"l'adversaire":S.winnerKey)}.`;
    return;
  }

  if(S.phase==='mulligan'){
    const done = S.mulliganDone && S.mulliganDone[MY_KEY];
    el.innerHTML = done ? '' : `<button onclick="uiMulligan()">Garder ma main (mulligan)</button>`;
    statusEl.textContent = done ? "En attente de l'adversaire pour le mulligan..." : 'Phase de mulligan.';
    return;
  }

  if(myTurn && S.phase==='main'){
    if(SELECTING_ATTACKERS){
      el.innerHTML = `
        <button onclick="uiConfirmAttackers()">Confirmer les attaquants (${SELECTED_ATTACKER_IDS.length})</button>
        <button class="secondary" onclick="uiCancelSelectAttackers()">Annuler</button>
      `;
      statusEl.textContent = 'Clique tes créatures pour les désigner comme attaquantes.';
    } else {
      el.innerHTML = `
        <button onclick="uiStartSelectAttackers()">Passer à l'attaque</button>
        <button class="secondary" onclick="uiEndTurn()">Terminer le tour (sans attaquer)</button>
        <button class="secondary" onclick="uiProcessAi()">Faire jouer l'IA (debug)</button>
      `;
      statusEl.textContent = "Ton tour — joue des cartes en cliquant dessus, ou passe à l'attaque.";
    }
  } else if(!myTurn && S.phase==='declareBlockersMe'){
    el.innerHTML = `<button onclick="uiFinishBlocking()">Terminer le blocage</button>`;
    statusEl.textContent = SELECTED_BLOCKER_ID
      ? "Clique maintenant l'attaquant adverse à bloquer avec cette créature."
      : "L'adversaire attaque — clique une de tes créatures pour la faire bloquer.";
  } else if(!myTurn){
    el.innerHTML = `<button class="secondary" onclick="uiProcessAi()">Faire jouer l'IA (debug)</button>`;
    statusEl.textContent = "Tour de l'adversaire...";
  }
}

// ---------------- Actions ----------------

async function uiMulligan(){ showResult('Mulligan', await gsMulligan([])); }
async function uiPlayCard(i){ showResult('Jouer carte', await gsPlayCardSimple(i)); }
async function uiEndTurn(){ showResult('Fin de tour', await gsEndTurn()); }
async function uiProcessAi(){ showResult('Tour IA', await gsProcessAiTurn()); }

function uiStartSelectAttackers(){ SELECTING_ATTACKERS = true; SELECTED_ATTACKER_IDS = []; render(); }
function uiCancelSelectAttackers(){ SELECTING_ATTACKERS = false; SELECTED_ATTACKER_IDS = []; render(); }
function uiToggleAttacker(id){
  const idx = SELECTED_ATTACKER_IDS.indexOf(id);
  if(idx>=0) SELECTED_ATTACKER_IDS.splice(idx,1); else SELECTED_ATTACKER_IDS.push(id);
  render();
}
async function uiConfirmAttackers(){
  const res = await gsDeclareAttackers(SELECTED_ATTACKER_IDS);
  showResult('Déclarer attaquants', res);
  SELECTING_ATTACKERS = false; SELECTED_ATTACKER_IDS = [];
}

async function uiAssignBlock(attackerId){
  if(!SELECTED_BLOCKER_ID) return;
  const res = await gsAssignBlock(SELECTED_BLOCKER_ID, attackerId);
  showResult('Bloquer', res);
  SELECTED_BLOCKER_ID = null;
}
async function uiFinishBlocking(){
  showResult('Terminer le blocage', await gsFinishBlocking());
  SELECTED_BLOCKER_ID = null;
}

// ---------------- Chat ----------------

function onChatMessage(msg){
  const el = document.getElementById('chat-log');
  const line = document.createElement('div');
  line.textContent = `${msg.sender_name}${msg.is_spectator?' (spectateur)':''} : ${msg.message}`;
  el.appendChild(line);
  el.scrollTop = el.scrollHeight;
}
async function uiSendChat(){
  const input = document.getElementById('chat-input');
  const user = await scGetCurrentUser();
  const res = await gsSendChatMessage(input.value, user ? user.email : 'Testeur');
  if(res.error) logLine('Chat → ' + res.error, 'log-error');
  input.value = '';
}

initSpellcraftAuth();
</script>
</body>
</html>
