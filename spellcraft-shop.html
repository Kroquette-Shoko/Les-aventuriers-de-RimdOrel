<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Spellcraft — Boutique</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Inter:wght@400;500;600;700&display=swap');

:root{
  --bg-void:#0b0a12;
  --bg-panel:#171325;
  --bg-panel-2:#1f1a30;
  --bg-panel-3:#241f38;
  --parchment:#efe6c8;
  --parchment-dim:#d9cfae;
  --ink:#1c1830;
  --arcane:#7c5cff;
  --gold:#d4af37;
  --blood:#c23b3b;
  --frost:#4fb3d9;
  --green:#4a9d6b;
  --wood:#3b2a1e;
  --wood-2:#4d3826;
}
*{box-sizing:border-box;}
html,body{margin:0;min-height:100%;background:var(--bg-void);color:var(--parchment);font-family:'Inter',sans-serif;}

#app{min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px 20px 60px;}

header{width:100%;max-width:1200px;display:flex;align-items:center;gap:14px;margin-bottom:10px;}
header a.back-link{font-size:11.5px;color:var(--parchment-dim);text-decoration:none;border:1px solid #3a3260;border-radius:8px;padding:6px 12px;}
header a.back-link:hover{border-color:var(--gold);color:var(--parchment);}
header h1{font-family:'Cinzel',serif;font-size:22px;color:var(--gold);margin:0;letter-spacing:1px;}
header .spacer{flex:1;}

/* ---------- barre de monnaie ---------- */
#currency-bar{display:flex;align-items:center;gap:10px;background:var(--bg-panel);border:1px solid #3a3260;border-radius:12px;padding:8px 14px;flex-wrap:wrap;}
.currency-chip{display:flex;align-items:center;gap:5px;font-size:12.5px;font-weight:700;padding:4px 9px;border-radius:14px;background:var(--bg-panel-2);}
.currency-chip .dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.currency-chip.gold .dot{background:var(--gold);}
.currency-chip.aube .dot{background:#e0b93a;}
.currency-chip.crepuscule .dot{background:#c23b3b;}
.currency-chip.volonte .dot{background:#4a9d6b;}
.currency-chip.prima .dot{background:#3a7fd8;}
.currency-chip.arcane .dot{background:#7c5cff;}

/* ---------- comptoir du vendeur ---------- */
#vendor-area{
  width:100%;max-width:900px;margin:22px 0 8px;
  background:linear-gradient(160deg,var(--wood-2),var(--wood));
  border:3px solid #241a12;border-radius:16px;
  box-shadow:0 20px 50px rgba(0,0,0,.6), inset 0 0 40px rgba(0,0,0,.4);
  padding:26px;display:flex;align-items:center;gap:22px;min-height:160px;
}
#vendor-portrait{
  width:120px;height:140px;flex-shrink:0;border-radius:10px;
  background:rgba(0,0,0,.3);border:2px solid var(--gold);
}
#vendor-speech{
  flex:1;font-family:'Cinzel',serif;font-size:14px;color:var(--parchment);
  background:rgba(0,0,0,.25);border-radius:10px;padding:14px 18px;line-height:1.5;
}

/* ---------- étagères ---------- */
#shelves{width:100%;max-width:1160px;display:flex;flex-direction:column;gap:26px;margin-top:20px;}
.shelf{background:var(--bg-panel);border:1px solid #2b2440;border-radius:14px;padding:18px 22px;}
.shelf h2{font-family:'Cinzel',serif;font-size:15px;color:var(--gold);margin:0 0 14px;letter-spacing:.5px;}
.shelf-items{display:flex;gap:16px;flex-wrap:wrap;}

.shop-item{
  width:150px;background:var(--bg-panel-2);border:1px solid #3a3260;border-radius:10px;
  padding:12px;display:flex;flex-direction:column;align-items:center;gap:8px;text-align:center;
  transition:transform .15s ease, border-color .15s ease;
}
.shop-item:hover{transform:translateY(-4px);border-color:var(--gold);}
.shop-item-art{width:100%;height:90px;border-radius:8px;background:linear-gradient(135deg,#2a2440,#191529);display:flex;align-items:center;justify-content:center;font-size:32px;}
.shop-item-name{font-family:'Cinzel',serif;font-size:12.5px;font-weight:700;}
.shop-item-desc{font-size:10.5px;color:var(--parchment-dim);line-height:1.4;}
.shop-item-price{display:flex;align-items:center;gap:5px;font-size:12px;font-weight:700;color:var(--gold);}
.buy-btn{width:100%;background:linear-gradient(180deg,var(--arcane),#5537c2);border:none;color:#fff;border-radius:8px;padding:7px;font-family:'Inter';font-weight:700;font-size:12px;cursor:pointer;}
.buy-btn:hover{filter:brightness(1.12);}
.buy-btn:disabled{background:#3a3260;cursor:not-allowed;filter:none;opacity:.6;}
.buy-btn.owned{background:var(--green);}

.empty-shelf{color:var(--parchment-dim);font-size:12.5px;font-style:italic;padding:10px 0;}

/* ---------- modales ---------- */
.modal-overlay{position:fixed;inset:0;background:rgba(5,4,10,.9);display:none;align-items:center;justify-content:center;z-index:80;padding:20px;}
.modal-overlay.show{display:flex;}
.modal-box{background:var(--bg-panel);border:1px solid #3a3260;border-radius:16px;padding:26px;max-width:700px;width:100%;max-height:85vh;overflow-y:auto;}
.modal-box h2{font-family:'Cinzel',serif;color:var(--gold);margin:0 0 16px;text-align:center;}
.reveal-grid{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-bottom:18px;}
.reveal-card{width:110px;background:#f7f2e2;color:#231d33;border-radius:8px;padding:8px;text-align:center;box-shadow:0 8px 18px rgba(0,0,0,.5);position:relative;}
.reveal-card.fragments{background:var(--bg-panel-3);color:var(--parchment);}
.reveal-card .rcard-name{font-family:'Cinzel',serif;font-weight:700;font-size:10.5px;margin-top:4px;}
.reveal-card .rcard-rarity{font-size:9px;opacity:.7;}
.reveal-card .rcard-badge{position:absolute;top:4px;right:4px;font-size:14px;}
.modal-actions{display:flex;justify-content:center;gap:10px;margin-top:10px;}
.modal-actions button{background:var(--bg-panel-2);border:1px solid #3a3260;color:var(--parchment);border-radius:8px;padding:9px 18px;font-family:'Inter';font-weight:600;cursor:pointer;}
.modal-actions button:hover{border-color:var(--gold);}
.shop-msg{text-align:center;font-size:13px;color:var(--parchment-dim);padding:20px;}
</style>
</head>
<body>

<div id="app">
  <header>
    <a class="back-link" href="spellcraft-hub.html">← Retour au hub</a>
    <h1>🛒 Boutique</h1>
    <div class="spacer"></div>
    <div id="sc-auth-slot"></div>
  </header>

  <div id="currency-bar">
    <div class="currency-chip gold"><span class="dot"></span><span id="cur-gold">–</span> Or</div>
    <div class="currency-chip aube"><span class="dot"></span><span id="cur-aube">–</span></div>
    <div class="currency-chip crepuscule"><span class="dot"></span><span id="cur-crepuscule">–</span></div>
    <div class="currency-chip volonte"><span class="dot"></span><span id="cur-volonte">–</span></div>
    <div class="currency-chip prima"><span class="dot"></span><span id="cur-prima">–</span></div>
    <div class="currency-chip arcane"><span class="dot"></span><span id="cur-arcane">–</span></div>
  </div>

  <div id="vendor-area">
    <div id="vendor-portrait" style="background-image:url('images/vendor-bruno.png');background-size:cover;background-position:top center;border-style:solid;border-color:var(--gold);"></div>
    <div id="vendor-speech"></div>
  </div>

  <div id="shelves">
    <div class="shelf">
      <h2>📦 Boosters</h2>
      <div class="shelf-items" id="shelf-boosters"></div>
    </div>
    <div class="shelf">
      <h2>🃏 Cartes à l'unité</h2>
      <div class="shelf-items" id="shelf-singles"></div>
    </div>
    <div class="shelf">
      <h2>🎴 Dos de cartes</h2>
      <div class="shelf-items" id="shelf-backs"></div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="reveal-modal">
  <div class="modal-box">
    <h2 id="reveal-title">Résultat</h2>
    <div class="reveal-grid" id="reveal-grid"></div>
    <div class="modal-actions">
      <button onclick="closeModal('reveal-modal')">Fermer</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="spellcraft-shared.js"></script>
<script src="spellcraft-auth.js"></script>
<script src="spellcraft-catalog.js"></script>
<script>
const RARITY_COLORS = {Basique:'#8a7f6a', Commune:'#c7c2b3', Rare:'#4fb3d9', Épique:'#7c5cff', Légendaire:'#d4af37'};
const BOOSTER_PRICE = 120;
const SINGLE_PRICE = 30;

// Répliques d'accueil de Bruno — on en ajoutera d'autres plus tard, une est tirée au hasard à chaque visite.
const BRUNO_LINES = [
  `Ohhhh, quel plaisir, quelle <em>joie</em>, quel <em>honneur</em> !! Bruno en personne t'accueille dans son humble échoppe — enfin, humble, façon de parler, regarde-moi ces merveilles ! Un petit booster, une carte par-ci par-là, un dos de carte assorti à tes bottes ? Sers-toi, mon trésor, l'or de ta bourse ne demande qu'à briller entre mes mains ✨🃏✨`
];
function renderBrunoLine(){
  document.getElementById('vendor-speech').innerHTML = BRUNO_LINES[Math.floor(Math.random()*BRUNO_LINES.length)];
}

async function refreshCurrency(){
  const profile = await loadUserProfile();
  if(!profile){
    document.getElementById('cur-gold').textContent = '—';
    return;
  }
  document.getElementById('cur-gold').textContent = profile.currency ?? 0;
  document.getElementById('cur-aube').textContent = profile.fragments_aube ?? 0;
  document.getElementById('cur-crepuscule').textContent = profile.fragments_crepuscule ?? 0;
  document.getElementById('cur-volonte').textContent = profile.fragments_volonte ?? 0;
  document.getElementById('cur-prima').textContent = profile.fragments_prima ?? 0;
  document.getElementById('cur-arcane').textContent = profile.fragments_arcane ?? 0;
}

async function renderBoosterShelf(){
  const el = document.getElementById('shelf-boosters');
  const { data, error } = await sb.from('boosters').select('*').order('price');
  if(error || !data || data.length===0){
    el.innerHTML = `<div class="empty-shelf">Aucun booster disponible pour l'instant — reviens plus tard !</div>`;
    return;
  }
  el.innerHTML = data.map(b=>`
    <div class="shop-item">
      <div class="shop-item-art" style="${b.image_url?`background-image:url('${b.image_url}');background-size:cover;`:''}">${b.image_url?'':'📦'}</div>
      <div class="shop-item-name">${escapeHtmlShop(b.name)}</div>
      <div class="shop-item-desc">6 cartes du set correspondant.</div>
      <div class="shop-item-price">🪙 ${b.price}</div>
      <button class="buy-btn" onclick="buyBooster('${b.id}', ${b.price})">Acheter</button>
    </div>
  `).join('');
}

async function renderSingleShelf(){
  const el = document.getElementById('shelf-singles');
  el.innerHTML = `<div class="empty-shelf">Chargement des cartes du jour...</div>`;
  const user = await scGetCurrentUser();
  if(!user){
    el.innerHTML = `<div class="empty-shelf">Connecte-toi pour voir les cartes du jour.</div>`;
    return;
  }
  const { data, error } = await sb.rpc('get_daily_shop_offers');
  if(error || data.error || !data.choices || data.choices.length===0){
    el.innerHTML = `<div class="empty-shelf">Aucune carte disponible pour l'instant (hors set de base).</div>`;
    return;
  }
  el.innerHTML = data.choices.map(c=>`
    <div class="shop-item">
      <div class="shop-item-art">🃏</div>
      <div class="shop-item-name">${escapeHtmlShop(c.name)}</div>
      <div class="shop-item-desc" style="color:${RARITY_COLORS[c.rarity]||'inherit'}">${c.rarity||''}${c.is_global?' · Carte du jour (tout le monde)':' · Ton offre personnelle'}</div>
      <div class="shop-item-price">🪙 ${SINGLE_PRICE}</div>
      <button class="buy-btn" onclick="confirmSingleChoice('${c.id}')">Acheter</button>
    </div>
  `).join('');
}

async function renderCardBackShelf(){
  const el = document.getElementById('shelf-backs');
  const { data, error } = await sb.from('card_backs').select('*').order('price');
  if(error || !data || data.length===0){
    el.innerHTML = `<div class="empty-shelf">Aucun dos de carte disponible pour l'instant — reviens plus tard !</div>`;
    return;
  }
  const user = await scGetCurrentUser();
  let owned = new Set();
  if(user){
    const { data: ownedRows } = await sb.from('user_card_backs').select('card_back_id').eq('user_id', user.id);
    owned = new Set((ownedRows||[]).map(r=>r.card_back_id));
  }
  el.innerHTML = data.map(cb=>{
    const isOwned = owned.has(cb.id);
    return `
      <div class="shop-item">
        <div class="shop-item-art" style="${cb.image_url?`background-image:url('${cb.image_url}');background-size:cover;`:''}">${cb.image_url?'':'🎴'}</div>
        <div class="shop-item-name">${escapeHtmlShop(cb.name)}</div>
        <div class="shop-item-price">🪙 ${cb.price}</div>
        <button class="buy-btn ${isOwned?'owned':''}" ${isOwned?'disabled':''} onclick="buyCardBack('${cb.id}')">${isOwned?'Possédé':'Acheter'}</button>
      </div>
    `;
  }).join('');
}

function escapeHtmlShop(s){
  return (s||'').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

async function buyBooster(boosterId){
  const user = await scGetCurrentUser();
  if(!user){ alert('Connecte-toi pour acheter dans la boutique.'); return; }
  const { data, error } = await sb.rpc('buy_booster', { p_booster_id: boosterId });
  if(error){ alert('Erreur : ' + error.message); return; }
  if(data.error){ alert(shopErrorMessage(data.error)); return; }
  showRevealModal('Booster ouvert !', data.cards.map(c=>({
    fragments: c.result==='fragments', name: c.name, rarity: c.rarity
  })));
  refreshCurrency();
}

async function confirmSingleChoice(cardId){
  const { data, error } = await sb.rpc('buy_single_card', { p_card_id: cardId, p_price: SINGLE_PRICE });
  if(error){ alert('Erreur : ' + error.message); return; }
  if(data.error){ alert(shopErrorMessage(data.error)); return; }
  showRevealModal('Carte obtenue !', [{ name: data.name, foil: data.foil, rarity: '' }]);
  refreshCurrency();
}

async function buyCardBack(id){
  const user = await scGetCurrentUser();
  if(!user){ alert('Connecte-toi pour acheter dans la boutique.'); return; }
  const { data, error } = await sb.rpc('buy_card_back', { p_card_back_id: id });
  if(error){ alert('Erreur : ' + error.message); return; }
  if(data.error){ alert(shopErrorMessage(data.error)); return; }
  refreshCurrency();
  renderCardBackShelf();
}

function shopErrorMessage(code){
  return {
    'not-logged-in': "Connecte-toi pour acheter dans la boutique.",
    'not-enough-gold': "Pas assez d'or pour cet achat.",
    'already-owned': "Tu possèdes déjà ce dos de carte.",
    'unknown-card-back': "Ce dos de carte n'existe plus.",
    'no-card-available': "Toutes les cartes disponibles sont déjà au maximum dans ta collection !",
    'already-maxed': "Tu as déjà le maximum de cette carte, choisis-en une autre.",
    'unknown-booster': "Ce booster n'existe plus."
  }[code] || ('Erreur : ' + code);
}

function showRevealModal(title, items){
  document.getElementById('reveal-title').textContent = title;
  const grid = document.getElementById('reveal-grid');
  grid.innerHTML = items.map(it=>{
    if(it.fragments){
      return `<div class="reveal-card fragments">
        <div style="font-size:26px;">✨</div>
        <div class="rcard-name">${escapeHtmlShop(it.name)}</div>
        <div class="rcard-rarity">Déjà au maximum — fragments obtenus</div>
      </div>`;
    }
    return `<div class="reveal-card">
      ${it.foil ? `<div class="rcard-badge" title="Foil">✨</div>` : ''}
      <div style="font-size:26px;">🃏</div>
      <div class="rcard-name">${escapeHtmlShop(it.name)}</div>
      <div class="rcard-rarity" style="color:${RARITY_COLORS[it.rarity]||'inherit'}">${it.rarity||(it.foil?'Foil':'')}</div>
    </div>`;
  }).join('');
  openModal('reveal-modal');
}

function openModal(id){ document.getElementById(id).classList.add('show'); }
function closeModal(id){ document.getElementById(id).classList.remove('show'); }

async function initShop(){
  renderBrunoLine();
  await renderBoosterShelf();
  await renderSingleShelf();
  await renderCardBackShelf();
  await refreshCurrency();
}
initSpellcraftAuth();
initShop();
sb.auth.onAuthStateChange(()=>{ refreshCurrency(); renderCardBackShelf(); renderSingleShelf(); });
</script>

</body>
</html>
