<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Les aventuriers de Rimd'Orël</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Inter:wght@400;500;600;700&display=swap');

:root{
  --bg-void:#0b0a12;
  --bg-panel:#171325;
  --bg-panel-2:#1f1a30;
  --parchment:#efe6c8;
  --parchment-dim:#d9cfae;
  --ink:#1c1830;
  --arcane:#7c5cff;
  --gold:#d4af37;
  --blood:#c23b3b;
  --frost:#4fb3d9;
  --green:#4a9d6b;
}
*{box-sizing:border-box;}
html,body{margin:0;height:100%;overflow:hidden;background:var(--bg-void);color:var(--parchment);font-family:'Inter',sans-serif;display:flex;align-items:center;justify-content:center;}

#app{width:100vw;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;}

#sc-auth-slot-wrap{position:absolute;top:10px;right:16px;z-index:6;width:auto;margin-bottom:0;}

#board-title{
  position:absolute;top:0.5%;left:50%;transform:translateX(-50%);z-index:5;
  font-family:'Cinzel',serif;font-weight:900;font-size:clamp(14px,2.1vw,26px);color:var(--gold);
  letter-spacing:1px;text-shadow:0 2px 3px rgba(0,0,0,.85), 0 0 22px rgba(0,0,0,.7);
  pointer-events:none;white-space:nowrap;text-align:center;
}

/* ---------- Le panneau d'affichage : taille classique, centré, jamais étiré ---------- */
#board{
  position:relative;
  width:min(92vw, 92vh * 1448 / 1086);
  height:min(92vh, 92vw * 1086 / 1448);
  background:url('images/hub-bg-board.png') center/100% 100% no-repeat;
  margin:0;
}

.poster{
  position:absolute;display:block;text-decoration:none;color:inherit;
  filter:drop-shadow(0 10px 18px rgba(0,0,0,.55));
  transition:transform .22s cubic-bezier(.2,.8,.3,1), filter .22s ease;
  cursor:pointer;
}
.poster img{display:block;width:100%;height:100%;object-fit:contain;}
.poster:hover{filter:drop-shadow(0 16px 26px rgba(0,0,0,.7)) drop-shadow(0 0 18px rgba(212,175,55,.45));}
.poster.soon{cursor:default;}
.poster.soon img{filter:grayscale(75%) brightness(.55);}
.poster.soon:hover{filter:drop-shadow(0 10px 18px rgba(0,0,0,.55));transform:none !important;}
.poster.soon .poster-label{color:var(--parchment-dim);}

/* Le gros tableau central : Recherche de partie */
.poster-center{left:38%;top:19%;width:24%;height:29%;transform:rotate(0deg);}
.poster-center:hover{transform:scale(1.04) translateY(-4px);}

/* Panneau de gauche : Boutique */
.poster-left{left:7.5%;top:44%;width:15%;height:24%;transform:rotate(-3deg);}
.poster-left:hover{transform:rotate(0deg) scale(1.05) translateY(-4px);}

/* Panneau de droite : Collection & Deck */
.poster-right{left:77.5%;top:44%;width:15%;height:24%;transform:rotate(3deg);}
.poster-right:hover{transform:rotate(0deg) scale(1.05) translateY(-4px);}

/* Sur le mur, au-dessus de la Boutique : Cartomancer (même taille que Succès/Quête) */
.poster-wall-left{left:7%;top:6%;width:14%;height:19%;transform:rotate(-4deg);}
.poster-wall-left:hover{transform:rotate(0deg) scale(1.08) translateY(-4px);}

/* Sous Recherche de partie, plus petites : Quête et Succès */
.poster-below-1{left:29%;top:50%;width:14%;height:19%;transform:rotate(-4deg);}
.poster-below-1:hover{transform:rotate(0deg) scale(1.08) translateY(-4px);}
.poster-below-2{left:57%;top:50%;width:14%;height:19%;transform:rotate(4deg);}
.poster-below-2:hover{transform:rotate(0deg) scale(1.08) translateY(-4px);}

.poster-label{
  position:absolute;bottom:-9%;left:50%;transform:translateX(-50%);
  font-family:'Cinzel',serif;font-size:clamp(10px,1.15vw,14px);font-weight:700;color:var(--gold);
  letter-spacing:.5px;white-space:nowrap;text-shadow:0 2px 6px rgba(0,0,0,.9);
  pointer-events:none;
}

.soon-ribbon{
  position:absolute;top:40%;left:50%;transform:translateX(-50%) rotate(-8deg);
  background:var(--blood);color:#fff;font-family:'Cinzel',serif;font-size:10px;font-weight:700;
  padding:2px 8px;border-radius:3px;letter-spacing:.5px;box-shadow:0 3px 8px rgba(0,0,0,.5);
  pointer-events:none;white-space:nowrap;
}

.note{
  margin-top:56px;background:var(--bg-panel-2);border:1px solid #3a3260;border-radius:12px;
  padding:14px 20px;max-width:640px;font-size:12.5px;color:var(--parchment-dim);line-height:1.6;text-align:center;
}
.note strong{color:var(--gold);}

footer{margin-top:26px;text-align:center;color:var(--parchment-dim);font-size:11.5px;max-width:600px;line-height:1.6;}
footer strong{color:var(--parchment);}

@media (max-width:760px){
  .poster-center{left:32%;top:23%;width:36%;height:32%;}
  .poster-left{left:2%;top:38%;width:22%;height:24%;}
  .poster-right{left:76%;top:38%;width:22%;height:24%;}
  .poster-wall-left{left:1%;top:3%;width:22%;height:24%;}
  .poster-below-1{left:29%;top:58%;width:19%;height:17%;}
  .poster-below-2{left:52%;top:58%;width:19%;height:17%;}
  .poster-label{font-size:9px;}
}
</style>
</head>
<body>

<div id="app">
  <div id="sc-auth-slot-wrap"><div id="sc-auth-slot"></div></div>

  <div id="board">
    <div id="board-title">Les aventuriers de Rimd'Orël</div>

    <a class="poster poster-center" href="spellcraft-prototype.html" title="Affronter l'IA ou un ami">
      <img src="images/hub-poster-jouer.png" alt="Recherche de partie">
      <span class="poster-label">Jouer</span>
    </a>

    <a class="poster poster-left" href="spellcraft-shop.html" title="Boosters, cartes à l'unité, dos de cartes">
      <img src="images/hub-poster-boutique.png" alt="Boutique">
      <span class="poster-label">Boutique</span>
    </a>

    <a class="poster poster-right" href="spellcraft-deckbuilder.html" title="Ta collection et tes decks">
      <img src="images/hub-poster-collection.png" alt="Collection et Deck">
      <span class="poster-label">Collection &amp; Deck</span>
    </a>

    <a class="poster poster-wall-left" href="spellcraft-card-editor.html" title="Créer et modifier tes cartes">
      <img src="images/hub-poster-editeur.png" alt="Cartomancer">
      <span class="poster-label">Éditeur de cartes</span>
    </a>

    <div class="poster poster-below-1 soon" title="Bientôt disponible">
      <img src="images/hub-poster-quete.png" alt="Quête">
      <span class="soon-ribbon">Bientôt</span>
      <span class="poster-label">Quêtes</span>
    </div>

    <div class="poster poster-below-2 soon" title="Bientôt disponible">
      <img src="images/hub-poster-succes.png" alt="Succès">
      <span class="soon-ribbon">Bientôt</span>
      <span class="poster-label">Succès</span>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="spellcraft-shared.js"></script>
<script src="spellcraft-auth.js"></script>
<script>
initSpellcraftAuth();
</script>

</body>
</html>
