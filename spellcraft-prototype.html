// Détermine quel(s) camp(s) (p1/p2) sont valables comme cible interactive pour
// un effet donné, du point de vue du joueur humain (toujours p1 ici). 'random'
// n'est pas interactif (résolu automatiquement ailleurs), donc renvoie aucun camp.
function targetableKeysForEffect(eff){
  const owner = eff && eff.targetOwner;
  if(owner==='ally') return ['p1'];
  if(owner==='any') return ['p1','p2'];
  if(owner==='random') return [];
  return ['p2']; // 'enemy' et repli par défaut (comportement historique)
}

function isTargetableCreature(c, isHeroPower){
  if(!isHeroPower && c.keywords.includes('stealth') && !c.hasAttacked) return false;
  return true;
}

// Récupère l'effet ciblé de la carte/pouvoir actuellement en attente de ciblage,
// quel que soit le type de carte (Sortilège/Créature/Artefact/pouvoir de héros).
function pendingTargetedEffect(){
  if(!S.pendingCard) return null;
  if(S.pendingCard.isHeroPower) return S.p1.hero.activeEffect;
  const card = S.p1.hand[S.pendingCard.index];
  if(!card) return null;
  if(card.type==='Sortilège') return card.effect;
  if(card.type==='Créature') return card.onPlayEffect;
  if(card.type==='Artefact') return card.triggeredEffects && card.triggeredEffects.onPlay;
  return null;
}

function shouldHighlightCreature(key, c){
  if(S.pendingSacrifice && key==='p1') return true;
  if(S.phase==='declareBlockersMe' && key==='p2') return (S.p2.attackers||[]).includes(c.instId);
  if(S.pendingCard){
    const eff = pendingTargetedEffect();
    if(!effectNeedsTarget(eff)) return false;
    if(!targetableKeysForEffect(eff).includes(key)) return false;
    return isTargetableCreature(c, !!S.pendingCard.isHeroPower);
  }
  return false;
}

function chooseSacrifice(creature){
  if(!S.pendingSacrifice) return;
  const { handIndex, targetInfo, isTrap } = S.pendingSacrifice;
  S.pendingSacrifice = null;
  if(isTrap){
    const card = S.p1.hand[handIndex];
    if(card) card._sacrificeChosen = creature;
    setTrap('p1', handIndex);
  } else {
    playCard('p1', handIndex, { ...(targetInfo||{}), _sacrifice: creature });
  }
}

function onCreatureClick(key, c, ev){
  if(S.gameOver) return;

  // choix de la créature à sacrifier pour un coût additionnel
  if(S.pendingSacrifice && key==='p1'){
    chooseSacrifice(c);
    return;
  }

  // ciblage sort/pouvoir
  if(S.pendingCard){
    const eff = pendingTargetedEffect();
    if(targetableKeysForEffect(eff).includes(key)){
      if(!isTargetableCreature(c, !!S.pendingCard.isHeroPower)){
        log(`${c.name} ne peut pas être ciblée (Furtif).`);
        return;
      }
      resolvePendingTarget({isHeroTarget:false, creature:c, player:S[key]});
      return;
    }
  }

  // déclaration des attaquants
  if(S.phase==='declareAttackers' && key==='p1'){
    if(!c.frozen && !c.stunned && !c.keywords.includes('protecteur') && (!c.summonSick || c.keywords.includes('charge'))){
      toggleAttacker(c.instId);
    } else if(c.keywords.includes('protecteur')){
      log(`${c.name} est Protecteur et ne peut pas attaquer.`);
    }
    return;
  }

  // blocage : je clique ma créature (bloqueur), puis l'attaquant adverse
  if(S.phase==='declareBlockersMe'){
    if(key==='p1'){
      if(c.keywords.includes('fearful')){
        log(`${c.name} est Peureux et ne peut pas bloquer.`);
        return;
      }
      if(!c.frozen && !c.stunned){ beginPlayerBlock(c.instId); }
      return;
    }
    if(key==='p2' && S.pendingBlocker){
      assignBlock(c.instId);
      return;
    }
  }
}

  const pc = S.pendingCard;

  endTargeting();
  if(pc.isHeroPower) useHeroPower('p1', targetInfo);
  else playCard('p1', pc.index, targetInfo);
}

let DRAW_ANIM_IN_PROGRESS = false;
let DRAW_ANIM_PENDING_CARDS = [];
let DRAW_ANIM_QUEUE = [];

function renderHand(){
  const el = document.getElementById('hand-p1');
  el.innerHTML='';
  const p = S.p1;
  const visibleHand = p.hand.filter(c=>!DRAW_ANIM_PENDING_CARDS.includes(c));
  const mid = (visibleHand.length-1)/2;
  visibleHand.forEach((card, idx)=>{
    const realIdx = p.hand.indexOf(card);
    const isLockedTrap = card.pendingTrap || card.activeTrap;
    const affordable = effectiveCost(p, card)<=availableMana(p) && S.phase==='main' && canPayExtraCost(p, card);
    const targetOk = !needsTarget(card) || hasValidTarget(
      card.type==='Sortilège' ? card.effect : card.type==='Créature' ? card.onPlayEffect : (card.triggeredEffects && card.triggeredEffects.onPlay),
      'p1'
    );
    const canAct = S.active==='p1' && !S.gameOver && !DRAW_ANIM_IN_PROGRESS && affordable && targetOk && !isLockedTrap;
    const c = cardEl(card, {
      displayCost: effectiveCost(p, card),
      onClick: (ev)=>{
        if(S.pendingCard && S.pendingCard.index===realIdx && !S.pendingCard.isHeroPower){
          // la carte se cible elle-même (ex: renforcer la créature qu'on est en train de jouer)
          const eff = pendingTargetedEffect();
          if(eff && (eff.targetOwner==='ally' || eff.targetOwner==='any')){
            resolvePendingTarget({ selfTarget:true });
          }
          return;
        }
        if(!canAct) return;
        if(card.type==='Piège'){ setTrap('p1', realIdx); return; }
        if(needsTarget(card)){
          const eff = card.type==='Sortilège' ? card.effect : card.type==='Créature' ? card.onPlayEffect : card.triggeredEffects.onPlay;
          if(!hasValidTarget(eff, 'p1')){
            log(`${card.name} : aucune cible valide, impossible de la jouer.`);
            return;
          }
          S.pendingCard = {index:realIdx};
          beginTargeting(ev.currentTarget);
          render();
        } else {
          playCard('p1', realIdx);
        }
      }
    });
    if(S.pendingCard && S.pendingCard.index===realIdx && !S.pendingCard.isHeroPower){
      const eff = pendingTargetedEffect();
      if(eff && (eff.targetOwner==='ally' || eff.targetOwner==='any')){
        c.classList.add('self-targetable');
        c.title = 'Cliquer pour cibler cette carte elle-même';
      }
    }
    if(isLockedTrap){
      c.classList.add(card.activeTrap ? 'trap-active' : 'trap-pending');
      if(card.activeTrap){
        const wolfIcon = document.createElement('div');
        wolfIcon.className = 'trap-wolf-icon';
        wolfIcon.textContent = '🪤';
        c.appendChild(wolfIcon);
      }
    } else if(!affordable || !targetOk){
      c.style.opacity='.45';
    }
    if(!isLockedTrap && affordable && !targetOk){
      c.title = 'Aucune cible valide disponible';
    }
    c.draggable = canAct;
    if(canAct){
      c.ondragstart = (ev)=>{
        dragState = {index: realIdx, card};
        ev.dataTransfer.effectAllowed = 'move';
        ev.dataTransfer.setData('text/plain', String(realIdx));
        setTimeout(()=>c.classList.add('dragging'), 0);
      };
      c.ondragend = ()=>{
        c.classList.remove('dragging');
        clearDropHighlights();
        dragState = null;
      };
    }
    const slot = document.createElement('div');
    slot.className = 'hand-card-slot';
    const offset = idx - mid;
    const rotateDeg = Math.max(-7, Math.min(7, offset * 1.6));
    const liftY = Math.min(6, Math.abs(offset) * 2);
    slot.style.transform = `rotate(${rotateDeg}deg) translateY(${liftY}px)`;
    slot.appendChild(c);
    el.appendChild(slot);
  });
}

/* ============================================================
   CIBLAGE VISUEL — ligne fléchée qui suit la souris
   ============================================================ */
let targetSource = null;
let targetMouse = null;
let lastMouse = {x:0,y:0};

function elCenter(el){
  const r = el.getBoundingClientRect();
  return {x:r.left+r.width/2, y:r.top+r.height/2};
}
function beginTargeting(el){
  clearTimeout(hoverTimer);
  hidePreview();
  targetSource = elCenter(el);
  targetMouse = {...targetSource};
  document.body.classList.add('targeting');
  drawTargetLine();
}
function endTargeting(){
  targetSource = null; targetMouse = null;
  document.body.classList.remove('targeting');
  document.getElementById('target-line').style.display='none';
  document.getElementById('target-origin').style.display='none';
  document.getElementById('target-arrow').style.display='none';
}
function drawTargetLine(){
  if(!targetSource || !targetMouse) return;
  const {x:x1,y:y1} = targetSource;
  const {x:x2,y:y2} = targetMouse;
  const line = document.getElementById('target-line');
  const origin = document.getElementById('target-origin');
  const arrow = document.getElementById('target-arrow');
  const angle = Math.atan2(y2-y1, x2-x1);
  const shorten = 14;
  const ex = x2 - Math.cos(angle)*shorten, ey = y2 - Math.sin(angle)*shorten;
  line.setAttribute('x1', x1); line.setAttribute('y1', y1);
  line.setAttribute('x2', ex); line.setAttribute('y2', ey);
  line.style.display='block';
  origin.setAttribute('cx', x1); origin.setAttribute('cy', y1);
  origin.style.display='block';
  const backX = x2 - Math.cos(angle)*16, backY = y2 - Math.sin(angle)*16;
  const perpX = Math.cos(angle+Math.PI/2)*7, perpY = Math.sin(angle+Math.PI/2)*7;
  arrow.setAttribute('points', `${x2},${y2} ${backX+perpX},${backY+perpY} ${backX-perpX},${backY-perpY}`);
  arrow.style.display='block';
}
document.addEventListener('mousemove', (e)=>{
  lastMouse = {x:e.clientX, y:e.clientY};
  if(!targetSource) return;
  targetMouse = {x:e.clientX, y:e.clientY};
  drawTargetLine();
});
document.addEventListener('keydown', (e)=>{
  if(e.key==='Escape'){
    if(document.getElementById('discard-modal').classList.contains('show')) closeDiscardModal();
    else cancelTargeting();
  }
});
document.addEventListener('contextmenu', (e)=>{
  if(targetSource){ e.preventDefault(); cancelTargeting(); }
});
function cancelTargeting(){
  if(!S.pendingCard) return;
  S.pendingCard = null;
  endTargeting();
  render();
}

/* ============================================================
   APERÇU AGRANDI AU SURVOL
   ============================================================ */
let hoverTimer = null;
const HOVER_DELAY = 500;
function actionInProgress(){ return !!(S.pendingCard) || !!(S.pendingSacrifice) || S.phase==='declareAttackers' || S.phase==='declareBlockersMe'; }
function attachHoverPreview(el, card){
  el.addEventListener('mouseenter', ()=>{
    clearTimeout(hoverTimer);
    const startX = lastMouse.x, startY = lastMouse.y;
    hoverTimer = setTimeout(()=>{
      if(actionInProgress()) return;
      if(!el.isConnected) return;
      showPreview(card, startX, startY);
    }, HOVER_DELAY);
  });
  el.addEventListener('mouseleave', ()=>{ clearTimeout(hoverTimer); hidePreview(); });
}
function findSpecificConjureGame(card){
  const effects = [card.effect, card.onPlayEffect].filter(Boolean);
  for(const eff of effects){
    if(eff.type==='conjure' && eff.mode==='specific' && eff.specificName) return eff.specificName;
  }
  return null;
}

function showPreview(card, x, y){
  const box = document.getElementById('card-preview');
  box.innerHTML='';
  box.style.display='flex'; box.style.alignItems='center'; box.style.gap='16px';

  const cw = 150*2.2, ch = 204*2.2;
  const mainSlot = document.createElement('div');
  mainSlot.style.cssText = `width:${cw}px;height:${ch}px;position:relative;`;
  mainSlot.appendChild(cardEl(card, {isPreview:true}));
  box.appendChild(mainSlot);

  let extraCount = 1;
  const conjuredName = findSpecificConjureGame(card);
  if(conjuredName){
    const rawConjured = ACTIVE_CARD_POOL.find(c=>c.name===conjuredName);
    if(rawConjured){
      const conjuredCard = normalizeCardForPool(rawConjured);
      const wrap = document.createElement('div');
      wrap.style.cssText = 'display:flex;flex-direction:column;align-items:center;gap:6px;';
      const arrow = document.createElement('div');
      arrow.textContent = '→ conjure';
      arrow.style.cssText = 'font-family:Cinzel,serif;font-size:14px;font-weight:700;color:var(--gold);text-shadow:0 1px 3px rgba(0,0,0,.85);white-space:nowrap;';
      const conjSlot = document.createElement('div');
      conjSlot.style.cssText = `width:${cw}px;height:${ch}px;position:relative;`;
      conjSlot.appendChild(cardEl(conjuredCard, {isPreview:true}));
      wrap.appendChild(arrow);
      wrap.appendChild(conjSlot);
      box.appendChild(wrap);
      extraCount = 2;
    }
  }

  const w = cw*extraCount + (extraCount>1 ? 48 : 0);
  const h = extraCount>1 ? ch+30 : ch;
  let left = x + 24, top = y - h/2;
  if(left + w > window.innerWidth - 12) left = x - 24 - w;
  top = Math.max(12, Math.min(top, window.innerHeight - h - 12));
  box.style.left = left+'px'; box.style.top = top+'px';
  box.classList.add('show');
}
function hidePreview(){ document.getElementById('card-preview').classList.remove('show'); }

/* ============================================================

   ============================================================ */
let LOADED_COLLECTION = [];
let LOADED_DECKS = [];
let CHOSEN_P1_DECK = null;

function deckSummary(d, collection){
  const hero = collection.find(c=>c.id===d.heroId);
  const region = collection.find(c=>c.id===d.regionId);
  const total = (d.cards||[]).reduce((s,c)=>s+c.count,0);
  return { hero, region, total, valid: !!hero && !!region && total>0 };
}

/* storageGet/storageSet viennent de spellcraft-shared.js */

async function initGameSetup(){
  LOADED_COLLECTION = await loadAllCardsAcrossSets();
  LOADED_DECKS = await loadUserDecks();

  LOADED_DECKS = LOADED_DECKS.filter(d=>deckSummary(d, LOADED_COLLECTION).valid);

  const roomId = mpGetRoomIdFromUrl();
  if(roomId){
    renderMultiplayerJoin(roomId);
    return;
  }
  renderDeckSelectStep1();
}

function dsBox(){ return document.getElementById('deck-select-box'); }

        Construis-en un dans le <strong>classeur / deckbuilder</strong>, puis reviens ici — ou lance directement une partie de démonstration.
      </div>
      <div class="dsel-actions">

function renderOpponentModeChoice(){
  const box = dsBox();
  box.innerHTML = `
    <h1>Contre qui ?</h1>
    <p class="sub">Avec "${escapeHtmlGS(CHOSEN_P1_DECK.name)}", tu veux jouer...</p>
    <div class="dsel-actions" style="flex-direction:column;gap:10px;max-width:320px;margin:16px auto 0;">
      <button class="phase-btn" onclick="renderDeckSelectStep2()">🤖 Contre l'IA</button>
      <button class="phase-btn secondary" onclick="renderMultiplayerCreate()">⚔️ Défier un ami</button>
    </div>
  `;
}

async function renderMultiplayerCreate(){
  const box = dsBox();
  box.innerHTML = `<h1>Défier un ami</h1><p class="sub">Création de l'invitation...</p>`;
  const res = await mpCreateRoom(CHOSEN_P1_DECK);
  if(res.error){
    box.innerHTML = `<h1>Erreur</h1><p class="sub">${escapeHtmlGS(res.error)}</p><div class="dsel-actions"><button class="phase-btn secondary" onclick="renderOpponentModeChoice()">Retour</button></div>`;

function mpCopyInviteLink(){
  const input = document.getElementById('mp-invite-link-input');
  input.select();
  navigator.clipboard?.writeText(input.value).catch(()=>document.execCommand('copy'));
}

async function renderMultiplayerJoin(roomId){
  const box = dsBox();
  box.innerHTML = `<h1>Rejoindre la partie</h1><p class="sub">Vérification de l'invitation...</p>`;
  const room = await mpGetRoom(roomId);
  if(!room){
    box.innerHTML = `<h1>Invitation introuvable</h1><p class="sub">Ce lien n'est plus valide.</p><div class="dsel-actions"><button class="phase-btn secondary" onclick="window.location.href='spellcraft-prototype.html'">Retour</button></div>`;
    return;
  }
  if(room.guest_id){
    box.innerHTML = `<h1>Invitation déjà utilisée</h1><p class="sub">Cette partie a déjà commencé avec un autre joueur.</p><div class="dsel-actions"><button class="phase-btn secondary" onclick="window.location.href='spellcraft-prototype.html'">Retour</button></div>`;
    return;
  }
  if(LOADED_DECKS.length===0){
    box.innerHTML = `<h1>Aucun deck disponible</h1><p class="sub">Construis d'abord un deck dans le classeur.</p><div class="dsel-actions"><button class="phase-btn secondary" onclick="window.location.href='spellcraft-deckbuilder.html'">Aller au deckbuilder</button></div>`;
    return;
  }
  box.innerHTML = `<h1>Rejoindre la partie</h1><p class="sub">Choisis le deck avec lequel tu veux jouer.</p><div id="ds-list-join"></div>`;
  const list = document.getElementById('ds-list-join');
  LOADED_DECKS.forEach(d=>{
    const sum = deckSummary(d, LOADED_COLLECTION);
    const item = document.createElement('div');
    item.className='deck-pick-item';
    item.innerHTML = `
      <div class="dp-icon">${(sum.hero.name[0]||'?')}</div>
      <div class="dp-info">
        <div class="dp-name">${escapeHtmlGS(d.name)}</div>
        <div class="dp-meta">${escapeHtmlGS(sum.hero.name)} (${escapeHtmlGS(sum.hero.class)}) · ${escapeHtmlGS(sum.region.name)} · ${sum.total} cartes</div>
      </div>
    `;
    item.onclick = async ()=>{
      box.innerHTML = `<h1>Connexion...</h1>`;
      const res = await mpJoinRoom(roomId, d);
      if(res.error){
        alert(res.error);
        renderMultiplayerJoin(roomId);

      }
      box.innerHTML = `
        <h1>Tu as rejoint la partie !</h1>

}

function renderDeckSelectStep2(){
  const box = dsBox();
  const others = LOADED_DECKS.filter(d=>d.id!==CHOSEN_P1_DECK.id);
  if(others.length===0){
    // un seul deck dispo : l'adversaire prend un deck de démo

  box.innerHTML = `<h1>Deck de l'adversaire</h1><p class="sub">Contre quel deck veux-tu jouer ?</p><div id="ds-list2"></div>`;
  const list = document.getElementById('ds-list2');
  others.forEach(d=>{
    const sum = deckSummary(d, LOADED_COLLECTION);
    const item = document.createElement('div');
    item.className='deck-pick-item';
    item.innerHTML = `
      <div class="dp-icon">${(sum.hero.name[0]||'?')}</div>
      <div class="dp-info">
        <div class="dp-name">${escapeHtmlGS(d.name)}</div>
        <div class="dp-meta">${escapeHtmlGS(sum.hero.name)} (${escapeHtmlGS(sum.hero.class)}) · ${escapeHtmlGS(sum.region.name)} · ${sum.total} cartes</div>

    item.onclick = ()=>launchWithChosenDeck(d);
    list.appendChild(item);

function launchWithChosenDeck(p2SavedDeck, p2IsAI){
  ACTIVE_CARD_POOL = LOADED_COLLECTION;
  const s1 = deckSummary(CHOSEN_P1_DECK, LOADED_COLLECTION);
  const p1Hero = buildHeroObject(s1.hero);
  const p1Region = buildRegionObject(s1.region);
  const p1Deck = buildDeckFromSaved(CHOSEN_P1_DECK, LOADED_COLLECTION);

  let p2Hero, p2Region, p2Deck;
  if(p2SavedDeck){
    const s2 = deckSummary(p2SavedDeck, LOADED_COLLECTION);
    p2Hero = buildHeroObject(s2.hero);
    p2Region = buildRegionObject(s2.region);
    p2Deck = buildDeckFromSaved(p2SavedDeck, LOADED_COLLECTION);
  } else {
    p2Hero = DEMO_HEROES.nocturne;
    p2Region = DEMO_REGIONS.marais;
    p2Deck = buildDemoDeck('Crépuscule');
    log('Aucun second deck disponible : l\'adversaire joue un deck de démonstration.');
  }

  document.getElementById('deck-select-overlay').style.display='none';
  startGame(p1Hero, p1Region, p1Deck, p2Hero, p2Region, p2Deck, p2IsAI);
}

function launchDemo(){
  document.getElementById('deck-select-overlay').style.display='none';
  startDemoGame();
}

/* ============================================================
   GLISSER-DÉPOSER — jouer une carte en la faisant glisser
   ============================================================ */
let dragState = null; // {index, card} de la carte en cours de glissement depuis la main

function clearDropHighlights(){
  document.querySelectorAll('.drop-hover').forEach(el=>el.classList.remove('drop-hover'));
}

// Effet ciblé d'une carte, quel que soit son type (identique à pendingTargetedEffect
// mais applicable à n'importe quelle carte, pas seulement celle en attente de ciblage).
function cardTargetedEffect(card){
  if(!card) return null;
  if(card.type==='Sortilège') return card.effect;
  if(card.type==='Créature') return card.onPlayEffect;
  if(card.type==='Artefact') return card.triggeredEffects && card.triggeredEffects.onPlay;
  return null;
}

function setupDragAndDrop(){
  const laneP1 = document.getElementById('lane-p1');
  const laneP2 = document.getElementById('lane-p2');
  const heroP1 = document.getElementById('hero-p1');
  const heroP2 = document.getElementById('hero-p2');
  const handP1 = document.getElementById('hand-p1');

  // déposer sur son propre plateau : joue une carte sans cible, cible une créature
  // alliée précise, ou se cible elle-même si déposée sur une zone vide.
  laneP1.addEventListener('dragover', (ev)=>{
    if(!dragState) return;
    ev.preventDefault();
    laneP1.classList.add('drop-hover');
    const eff = cardTargetedEffect(dragState.card);
    const slot = ev.target.closest('.card-slot');
    clearDropHighlights();
    laneP1.classList.add('drop-hover');
    if(slot && eff && targetableKeysForEffect(eff).includes('p1')) slot.classList.add('drop-hover');
  });
  laneP1.addEventListener('dragleave', ()=>laneP1.classList.remove('drop-hover'));
  laneP1.addEventListener('drop', (ev)=>{
    laneP1.classList.remove('drop-hover');
    clearDropHighlights();
    if(!dragState) return;
    ev.preventDefault();
    const card = dragState.card, index = dragState.index;
    const eff = cardTargetedEffect(card);
    const slot = ev.target.closest('.card-slot');

    if(needsTarget(card)){
      if(slot){
        const creature = S.p1.board.find(c=>c.instId===slot.dataset.instId);
        if(creature && eff && targetableKeysForEffect(eff).includes('p1') && isTargetableCreature(creature, false)){
          playCard('p1', index, {isHeroTarget:false, creature, player:S.p1});
        }
      } else if(eff && (eff.targetOwner==='ally' || eff.targetOwner==='any')){
        // déposée sur une zone vide de son propre plateau : se cible elle-même
        playCard('p1', index, { selfTarget:true });
      }
      dragState = null;
      return;
    }
    if(card.type==='Piège') setTrap('p1', index);
    else playCard('p1', index);
    dragState = null;
  });

  // déposer sur son propre héros : cible le héros allié (ex: Soin)
  heroP1.addEventListener('dragover', (ev)=>{
    if(!dragState) return;
    const eff = cardTargetedEffect(dragState.card);
    if(!(eff && (eff.type==='damage' || eff.type==='heal') && targetableKeysForEffect(eff).includes('p1'))) return;
    ev.preventDefault();
    heroP1.classList.add('drop-hover');
  });
  heroP1.addEventListener('dragleave', ()=>heroP1.classList.remove('drop-hover'));
  heroP1.addEventListener('drop', (ev)=>{
    heroP1.classList.remove('drop-hover');
    if(!dragState) return;
    const eff = cardTargetedEffect(dragState.card);
    if(!(eff && (eff.type==='damage' || eff.type==='heal') && targetableKeysForEffect(eff).includes('p1'))) return;
    ev.preventDefault();
    playCard('p1', dragState.index, {isHeroTarget:true, player:S.p1, key:'p1'});
    dragState = null;
  });

  // déposer sur une créature ennemie : joue un sort/effet ciblé sur elle
  laneP2.addEventListener('dragover', (ev)=>{
    const eff = dragState && cardTargetedEffect(dragState.card);
    if(!dragState || !eff || !effectNeedsTarget(eff) || !targetableKeysForEffect(eff).includes('p2')) return;
    ev.preventDefault();
    const slot = ev.target.closest('.card-slot');
    clearDropHighlights();
    if(slot) slot.classList.add('drop-hover');
  });
  laneP2.addEventListener('dragleave', clearDropHighlights);
  laneP2.addEventListener('drop', (ev)=>{
    clearDropHighlights();
    const eff = dragState && cardTargetedEffect(dragState.card);
    if(!dragState || !eff || !effectNeedsTarget(eff) || !targetableKeysForEffect(eff).includes('p2')) return;
    const slot = ev.target.closest('.card-slot');
    if(!slot) return;
    ev.preventDefault();
    const creature = S.p2.board.find(c=>c.instId===slot.dataset.instId);
    if(!creature) return;
    if(!isTargetableCreature(creature, false)){
      log(`${creature.name} ne peut pas être ciblée (Protection ou Furtif).`);
      dragState = null;
      return;
    }
    playCard('p1', dragState.index, {isHeroTarget:false, creature, player:S.p2});
    dragState = null;
  });

  // déposer sur le héros ennemi : joue un sort de dégâts (ou soin sur soi si "any") directement sur lui
  heroP2.addEventListener('dragover', (ev)=>{
    if(!dragState) return;
    const eff = cardTargetedEffect(dragState.card);
    if(!(eff && (eff.type==='damage' || eff.type==='heal') && targetableKeysForEffect(eff).includes('p2'))) return;
    ev.preventDefault();
    heroP2.classList.add('drop-hover');
  });
  heroP2.addEventListener('dragleave', ()=>heroP2.classList.remove('drop-hover'));
  heroP2.addEventListener('drop', (ev)=>{
    heroP2.classList.remove('drop-hover');
    if(!dragState) return;
    const eff = cardTargetedEffect(dragState.card);
    if(!(eff && (eff.type==='damage' || eff.type==='heal') && targetableKeysForEffect(eff).includes('p2'))) return;
    ev.preventDefault();
    playCard('p1', dragState.index, {isHeroTarget:true, player:S.p2, key:'p2'});
    dragState = null;
  });

  // déposer sur la main : annule simplement l'action (la carte n'a jamais quitté la main)
  handP1.addEventListener('dragover', (ev)=>{ if(dragState) ev.preventDefault(); });
  handP1.addEventListener('drop', (ev)=>{ if(dragState){ ev.preventDefault(); dragState = null; } });
}
setupDragAndDrop();

initGameSetup();
initSpellcraftAuth();
</script>
