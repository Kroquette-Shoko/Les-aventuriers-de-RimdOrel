/* ============================================================
   LOG
   ============================================================ */
function log(msg){
  const div = document.createElement('div');
  div.textContent = msg;
  document.getElementById('log').prepend(div);
}
function cardOwnerName(key){ return key==='p1' ? 'Vous' : 'L\'adversaire'; }

/* ============================================================
   RESSOURCES — mana normal / fragile / vide
   ============================================================ */
function applyManaGain(p, key){
  const region = p.region;
  const altAb = region && region.triggeredEffects && region.triggeredEffects.manaAlternative;
  if(altAb && conditionsMet(altAb.conditions, p, key)){
    log(`${cardOwnerName(key)} : ${region.name} déclenche son effet alternatif au lieu du mana normal ce tour-ci.`);
    fireResolvedEffect(altAb, p, key, null, null, null);
    firePermanentTriggers(key, 'onManaGained');
    return;
  }
  p.manaNormalMax = Math.min(10, p.manaNormalMax+1);
  p.manaNormal = p.manaNormalMax;
  p.manaGainedThisTurn = (p.manaGainedThisTurn||0) + 1;
  if(region.manaRule==='bonusFragile'){
    p.manaFragile += 1;
    p.manaGainedThisTurn += 1;
    log(`${cardOwnerName(key)} : ${region.name} octroie 1 mana fragile supplémentaire.`);
  }
  firePermanentTriggers(key, 'onManaGained');
}
function availableMana(p){ return p.manaNormal + p.manaFragile; }
function spendMana(p, amount){
  let remaining = amount;
  const fromNormal = Math.min(p.manaNormal, remaining);
  p.manaNormal -= fromNormal; remaining -= fromNormal;
  const fromFragile = Math.min(p.manaFragile, remaining);
  p.manaFragile -= fromFragile; remaining -= fromFragile;
}
function gainEmptyMana(p, key, amount){
  p.manaNormalMax = Math.min(10, p.manaNormalMax+amount);
  log(`${cardOwnerName(key)} gagne ${amount} mana vide (maximum augmenté, indisponible ce tour-ci).`);
}
function gainFragileMana(p, key, amount){
  p.manaFragile += amount;
  log(`${cardOwnerName(key)} gagne ${amount} mana fragile.`);
}

/* ============================================================
   TOUR
   ============================================================ */
function modifyHp(p, delta){
  p.hp += delta;
  if(delta<0) p.hpLostThisTurn = (p.hpLostThisTurn||0) + (-delta);
  else if(delta>0){
    p.hpGainedThisTurn = (p.hpGainedThisTurn||0) + delta;
    const key = p===S.p1 ? 'p1' : p===S.p2 ? 'p2' : null;
    if(key) fireWatchTrigger('watchHeroHealed', key);
  }
}

function startTurn(key, first){
  const p = S[key];
  applyManaGain(p, key);

  if(!p.gameStartFired){
    p.gameStartFired = true;
    suppressDamagePopups = true;
    triggerGameStart(p, key);
    suppressDamagePopups = false;
  }

  p.hpLostThisTurn = 0;
  p.hpGainedThisTurn = 0;
  p.cardsDrawnThisTurn = 0;
  p.manaGainedThisTurn = 0;
  p.creaturesDiedThisTurn = 0;
  p.creaturesArrivedThisTurn = 0;
  p.artifactsDiedThisTurn = 0;
  p.artifactsArrivedThisTurn = 0;
  p.artifactsActivatedThisTurn = 0;

  // pièges actifs jamais déclenchés : se désarment au retour du tour de leur propriétaire
  p.hand.forEach(card=>{
    if(card.activeTrap){
      card.activeTrap = false;
      card.reservedMana = undefined;
      log(`${cardOwnerName(key)} : ${card.name} n'a pas été déclenché et se désarme.`);
    }
  });

  // début de tour : déclenche les capacités "début de votre tour" sur tous les permanents
  firePermanentTriggers(key, 'startOfTurn');
  firePermanentTriggers(key, 'startOfTurnX');

  // reliques : décompte des charges (indépendant de leur capacité éventuelle)
  p.relics.forEach(r=>{ r.charges--; });
  const deadRelics = p.relics.filter(r=>r.charges<=0);
  p.discard.push(...deadRelics);
  p.artifactsDiedThisTurn = (p.artifactsDiedThisTurn||0) + deadRelics.length;
  p.relics = p.relics.filter(r=>r.charges>0);

  drawCard(p, key);

  p.board.forEach(c=>{
    c.frozen=false;
    c.stunned=false;
    c.summonSick=false;
    c.protectedActive=false;
    if(c._tempKeywords && c._tempKeywords.length){
      c.keywords = c.keywords.filter(k=>!c._tempKeywords.includes(k));
      c._tempKeywords = [];
    }
    c.hasAttacked=false;
  });

  if(p.heroCooldown>0) p.heroCooldown--;

  S.phase = 'main';
  S.attackPhaseDone = false;
  S.selectedAttacker=null; S.pendingCard=null; S.pendingBlocker=null;
  log(`--- Tour ${S.turn} : ${key==='p1'?'Votre tour':'Tour de l\'adversaire'} ---`);
  render();

  if(p.isAI) setTimeout(runAI, 700);
}

function resolveTrapReservations(key){
  const p = S[key];
  p.hand.forEach(card=>{
    if(!card.pendingTrap) return;
    if(availableMana(p) >= card.reservedMana){
      card.pendingTrap = false;
      card.activeTrap = true;
      log(`${cardOwnerName(key)} : ${card.name} est maintenant armé et actif.`);
    } else {
      card.pendingTrap = false;
      card.reservedMana = undefined;
      log(`${cardOwnerName(key)} : mana insuffisant en fin de tour, ${card.name} ne s'active pas.`);
    }
  });
}

function endTurn(){
  if(S.gameOver) return;
  firePermanentTriggers(S.active, 'endOfTurn');
  firePermanentTriggers(S.active, 'endOfTurnX');
  resolveTrapReservations(S.active);
  fireTrap(S.active==='p1' ? 'p2' : 'p1', 'onOpponentEndTurn', null);
  S[S.active].pendingDiscount = null;
  S.selectedAttacker = null;
  S.pendingCard = null;
  endTargeting();
  if(S.active==='p1'){
    S.active='p2';
    startTurn('p2');
  } else {
    S.turn++;
    S.active='p1';
    startTurn('p1');
  }
}

/* ============================================================
   DÉGÂTS / MORT
   ============================================================ */
let suppressDamagePopups = false;

function fireHeroTrigger(key, triggerName){
  const p = S[key];
  if(!p || !p.hero) return;
  const eff = p.hero.triggeredEffects && p.hero.triggeredEffects[triggerName];
  if(!eff) return;
  if(!conditionsMet(eff.conditions, p, key)) return;
  fireResolvedEffect(eff, p, key, null, null, null);
}

function dealDamageToHero(targetPlayer, targetKey, amount, sourcePlayer){
  modifyHp(targetPlayer, -amount);
  if(!suppressDamagePopups) spawnDamageNumber(document.querySelector(`#hero-${targetKey} .hero-portrait`), amount);
  if(targetPlayer.hp<=0){
    endGame(targetKey==='p1' ? 'p2' : 'p1');
  } else {
    fireHeroTrigger(targetKey, 'onDamaged');
  }
}

function spawnDamageNumber(anchorEl, amount){
  if(!anchorEl || !amount) return;
  const r = anchorEl.getBoundingClientRect();
  const el = document.createElement('div');
  el.className = 'dmg-popup';
  el.textContent = '-' + amount;
  el.style.left = (r.left + r.width/2) + 'px';
  el.style.top = (r.top + r.height*0.35) + 'px';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(), 1450);
}

function lungeToward(el, targetEl, duration){
  if(!el || !el.animate || !targetEl) return;
  const a = el.getBoundingClientRect(), b = targetEl.getBoundingClientRect();
  const dx = (b.left+b.width/2) - (a.left+a.width/2);
  const dy = (b.top+b.height/2) - (a.top+a.height/2);
  const len = Math.hypot(dx,dy) || 1;
  const ux = dx/len, uy = dy/len;
  const dist = 16;
  el.animate([
    { transform:'translate(0,0)' },
    { transform:`translate(${-ux*6}px, ${-uy*6}px)`, offset:0.22 },
    { transform:`translate(${ux*dist}px, ${uy*dist}px)`, offset:0.5 },
    { transform:'translate(0,0)' }
  ], { duration: duration||650, easing:'ease-in-out' });
}

function applyDamage(dealer, dealerP, dealerKey, target, targetP, targetKey){
  const dmg = dealer.curAtk;
  if(target.keywords.includes('armor') && !target.armorUsed){
    target.armorUsed = true;
    log(`${target.name} absorbe les dégâts grâce à Armure.`);
    return 0;
  }
  target.curHp -= dmg;
  if(!suppressDamagePopups) spawnDamageNumber(document.querySelector(`[data-inst-id="${target.instId}"]`), dmg);
  if(dealer.keywords.includes('toxic') && dmg>0){
    target.curHp = Math.min(target.curHp, 0);
    log(`${target.name} est empoisonnée par Toxique et meurt.`);
  }
  if(dealer.keywords.includes('lifesteal')){
    modifyHp(dealerP, dmg);
    log(`${dealer.name} soigne son héros de ${dmg} PV (Vol de vie).`);
  }
  if(dealer.keywords.includes('pierce') && target.curHp<0){
    const excess = -target.curHp;
    dealDamageToHero(targetP, targetKey, excess, dealerP);
    log(`Perçant : ${excess} dégâts excédentaires passent au héros ennemi.`);
  }
  fireCreatureTrigger(targetKey, target, 'onDamaged');
  fireWatchTrigger('watchDamaged', targetKey);
  if(target.curHp<=0) fireCreatureTrigger(dealerKey, dealer, 'onKill');
  return dmg;
}

function cleanupDeaths(){
  const revived = []; // { creature, key } — capacités "revient du cimetière" à déclencher après coup
  const dead = []; // { creature, key } — capacités "à la mort" à déclencher après coup
  ['p1','p2'].forEach(key=>{
    const p = S[key];
    const survivors = [];
    p.board.forEach(c=>{
      if(c.curHp<=0){
        if(c.keywords.includes('relentless')){
          c.curHp = c.hp;
          c.keywords = c.keywords.filter(k=>k!=='relentless');
          log(`${c.name} revient en jeu grâce à Tenace.`);
          survivors.push(c);
          if(c.onReviveEffect) revived.push({creature:c, key});
        } else {
          p.discard.push(c);
          log(`${c.name} meurt.`);
          dead.push({creature:c, key});
          p.creaturesDiedThisTurn = (p.creaturesDiedThisTurn||0) + 1;
        }
      } else {
        survivors.push(c);
      }
    });
    p.board = survivors;
  });
  // déclenché après coup (et non pendant la boucle ci-dessus) pour éviter tout
  // problème si cet effet redéclenchait lui-même une vérification des morts
  revived.forEach(({creature, key})=>{
    const p = S[key];
    const eff = creature.onReviveEffect;
    if(eff.targetOwner==='self' && TARGETED_EFFECTS.includes(eff.type)){
      fireResolvedEffect(eff, p, key, creature, {isHeroTarget:false, creature, player:p}, null);
    } else if(!effectNeedsTarget(eff)){
      fireResolvedEffect(eff, p, key, creature, {}, null);
    }
    // les capacités de résurrection ciblant l'adversaire ne sont pas encore prises en charge
  });
  dead.forEach(({creature, key})=>{
    fireCreatureTrigger(key, creature, 'onDeath');
    fireCreatureTrigger(key, creature, 'onDestroyed');
    fireWatchTrigger('watchDeath', key);
  });
}

// Déclenche, pour un joueur donné, la capacité (si elle existe) correspondant à
// un déclencheur donné, sur chacun de ses permanents en jeu (créatures, héros,
// région, artefacts). Les effets qui se ciblent eux-mêmes ("Cette carte") ne
// sont gérés que pour les créatures ; les effets ciblant l'adversaire depuis
// ces déclencheurs ne sont pas encore pris en charge.
// Déclenche un événement "observable" (ex: une carte quelconque meurt) sur TOUS
// les permanents des deux joueurs qui le surveillent, en respectant leur filtre
// Alliées/Ennemies/Les deux par rapport au camp où l'événement s'est produit.
function fireWatchTrigger(triggerName, eventOwnerKey, eventCreature){
  ['p1','p2'].forEach(watcherKey=>{
    const p = S[watcherKey];
    if(!p) return;
    const sources = [
      ...p.board.map(c=>({source:c, isCreature:true})),
      p.hero ? {source:p.hero, isCreature:false} : null,
      p.region ? {source:p.region, isCreature:false} : null,
      ...(p.relics||[]).map(r=>({source:r, isCreature:false}))
    ].filter(Boolean);
    sources.forEach(({source, isCreature})=>{
      const eff = source.triggeredEffects && source.triggeredEffects[triggerName];
      if(!eff) return;
      const owner = eff._triggerOwner || 'ally';
      const isAllyEvent = eventOwnerKey===watcherKey;
      if(owner==='ally' && !isAllyEvent) return;
      if(owner==='enemy' && isAllyEvent) return;
      if(!conditionsMet(eff.conditions, p, watcherKey)) return;
      fireResolvedEffect(eff, p, watcherKey, isCreature?source:null, null, eventCreature);
    });
  });
}

// Résout automatiquement une cible pour un effet déclenché automatiquement
// (pas de sélection interactive possible dans ce contexte) : soi-même si
// targetOwner='self', sinon une créature au hasard du bon camp.
function autoResolveTargetForTriggeredEffect(eff, p, key, sourceCreature){
  if(eff.targetOwner==='self'){
    if(sourceCreature) return {isHeroTarget:false, creature:sourceCreature, player:p};
    return {isHeroTarget:true, player:p, key};
  }
  const oppKey = key==='p1' ? 'p2' : 'p1';
  const wantsHeroOnly = (eff.type==='damage' || eff.type==='heal') && (eff.targetCategory==='hero' || eff.targetCategory==='player');
  if(wantsHeroOnly){
    const heroKey = eff.targetOwner==='enemy' ? oppKey : key;
    return {isHeroTarget:true, player:S[heroKey], key:heroKey};
  }
  const pool = eff.targetOwner==='enemy' ? S[oppKey].board : p.board;
  const poolP = eff.targetOwner==='enemy' ? S[oppKey] : p;
  if(pool.length>0){
    const c = pool[Math.floor(Math.random()*pool.length)];
    return {isHeroTarget:false, creature:c, player:poolP};
  }
  return {};
}

function firePermanentTriggers(key, triggerName, eventCreature){
  const p = S[key];
  if(!p) return;
  const sources = [
    ...p.board.map(c=>({source:c, isCreature:true})),
    p.hero ? {source:p.hero, isCreature:false} : null,
    p.region ? {source:p.region, isCreature:false} : null,
    ...(p.relics||[]).map(r=>({source:r, isCreature:false}))
  ].filter(Boolean);
  sources.forEach(({source, isCreature})=>{
    const eff = source.triggeredEffects && source.triggeredEffects[triggerName];
    if(!eff) return;
    if((triggerName==='startOfTurnX' || triggerName==='endOfTurnX') && S.turn!==(eff._triggerTurn||1)) return;
    if(!conditionsMet(eff.conditions, p, key)) return;
    fireResolvedEffect(eff, p, key, isCreature?source:null, null, eventCreature);
  });
}

// Déclenche la capacité liée à un événement propre à UNE créature précise
// (ex: elle-même meurt, elle-même attaque) plutôt qu'à tout le plateau.
function fireCreatureTrigger(key, creature, triggerName){
  const p = S[key];
  if(!p || !creature) return;
  const eff = creature.triggeredEffects && creature.triggeredEffects[triggerName];
  if(!eff) return;
  if(!conditionsMet(eff.conditions, p, key)) return;
  fireResolvedEffect(eff, p, key, creature, null, null);
}

/* ============================================================
   JOUER UNE CARTE
   ============================================================ */
function needsTarget(card){
  if(card.type==='Sortilège') return effectNeedsTarget(card.effect);
  if(card.type==='Créature' && card.onPlayEffect) return effectNeedsTarget(card.onPlayEffect) && card.onPlayEffect.targetOwner!=='self';
  if(card.type==='Artefact' && card.triggeredEffects && card.triggeredEffects.onPlay) return effectNeedsTarget(card.triggeredEffects.onPlay) && card.triggeredEffects.onPlay.targetOwner!=='self';
  return false;
}
function effectNeedsTarget(effect){
  return !!effect && TARGETED_EFFECTS.includes(effect.type);
}
// Vérifie qu'au moins une cible valide existe réellement sur le plateau pour cet effet,
// du point de vue du joueur casterKey (avant même de tenter de jouer la carte).
function hasValidTarget(effect, casterKey){
  if(!effect || !effectNeedsTarget(effect)) return true;
  if(effect.targetOwner==='self') return true;
  const wantsHero = (effect.type==='damage' || effect.type==='heal');
  if(wantsHero) return true; // le héros (allié ou ennemi selon le cas) est toujours une cible disponible
  const keys = targetableKeysForEffect(effect);
  return keys.some(k => S[k] && S[k].board.some(c => isTargetableCreature(c, false)));
}

function instantiateCreature(card){
  const kw = card.keywords||[];
  return {
    ...card, instId: nextId(),
    curAtk: card.atk, curHp: card.hp,
    keywords:[...kw],
    summonSick: !kw.includes('charge'),
    hasAttacked:false, frozen:false, stunned:false, armorUsed:false
  };
}

function effectiveCost(p, card){
  let cost = card.cost;
  if(p.pendingDiscount && (p.pendingDiscount.cardType==='Toutes' || p.pendingDiscount.cardType===card.type)){
    cost = Math.max(0, cost - p.pendingDiscount.amount);
  }
  (p.activeCostReductions||[]).forEach(r=>{
    const typeMatches = !r.cardType || r.cardType==='any' || r.cardType===card.type;
    const subtypeMatches = !r.subtype || (card.subtypes||[]).some(s=>s.trim().toLowerCase()===r.subtype.toLowerCase());
    if(typeMatches && subtypeMatches){
      cost = Math.max(0, cost - r.amount);
    }
  });
  return cost;
}

let cardRevealTimer = null;
function showCardReveal(card){
  const box = document.getElementById('card-reveal');
  const inner = document.getElementById('card-reveal-inner');
  inner.innerHTML = '';
  inner.appendChild(cardEl(card, {isPreview:true}));
  box.classList.add('show');
  clearTimeout(cardRevealTimer);
  cardRevealTimer = setTimeout(()=>{ box.classList.remove('show'); }, 2000);
}

function setTrap(key, handIndex){
  const p = S[key];
  const card = p.hand[handIndex];
  if(!card || card.type!=='Piège') return false;
  if(card.pendingTrap || card.activeTrap) return false; // déjà en cours
  if(p.hand.some(c=>c!==card && (c.pendingTrap || c.activeTrap))) return false; // un seul piège à la fois
  const cost = effectiveCost(p, card);
  if(availableMana(p) < cost) return false;
  if(!canPayExtraCost(p, card)) return false;

  if(key==='p1' && card.extraCostEnabled && card.extraCostType==='sacrificeCreature' && p.board.length>1 && !card._sacrificeChosen){
    S.pendingSacrifice = { handIndex, isTrap:true };
    log('Choisis la créature à sacrifier pour payer le coût additionnel.');
    render();
    return 'needs-sacrifice';
  }
  payExtraCost(key, p, card, card._sacrificeChosen);
  delete card._sacrificeChosen;
  card.pendingTrap = true;
  card.reservedMana = cost;
  log(`${cardOwnerName(key)} réserve ${cost} mana pour poser ${card.name} (confirmé en fin de tour).`);
  triggerOpponentPlayTraps(key, card, null);
  render();
  return true;
}

function canPayExtraCost(p, card){
  if(!card.extraCostEnabled) return true;
  switch(card.extraCostType){
    case 'sacrificeCreature': return p.board.length>=1;
    case 'discardCard': return p.hand.filter(c=>c!==card).length>=1;
    default: return true; // loseLife et custom sont toujours payables
  }
}
function payExtraCost(key, p, card, chosenSacrifice){
  if(!card.extraCostEnabled) return;
  switch(card.extraCostType){
    case 'sacrificeCreature': {
      if(p.board.length===0) return;
      const target = (chosenSacrifice && p.board.includes(chosenSacrifice))
        ? chosenSacrifice
        : [...p.board].sort((a,b)=>(a.curAtk+a.curHp)-(b.curAtk+b.curHp))[0];
      target.curHp = 0;
      log(`${cardOwnerName(key)} sacrifie ${target.name} pour payer le coût additionnel de ${card.name}.`);
      cleanupDeaths();
      break;
    }
    case 'discardCard': {
      const pool = p.hand.filter(c=>c!==card);
      if(pool.length===0) return;
      const pick = pool[Math.floor(Math.random()*pool.length)];
      p.hand = p.hand.filter(c=>c!==pick);
      p.discard.push(pick);
      log(`${cardOwnerName(key)} défausse ${pick.name} pour payer le coût additionnel de ${card.name}.`);
      break;
    }
    case 'loseLife': {
      const amt = card.extraCostAmount||1;
      modifyHp(p, -amt);
      log(`${cardOwnerName(key)} perd ${amt} PV pour payer le coût additionnel de ${card.name}.`);
      break;
    }
    // 'custom' : pas de traduction mécanique possible, aucun effet appliqué
  }
}

function triggerOpponentPlayTraps(key, card, inst){
  const oppKey = key==='p1' ? 'p2' : 'p1';
  if(card.type==='Créature') fireTrap(oppKey, 'onOpponentPlayCreature', inst||null);
  else if(card.type==='Sortilège') fireTrap(oppKey, 'onOpponentSpell', null);
  fireTrap(oppKey, 'onOpponentPlayCard', inst||null);
}

// Déclenché quand une créature entre en jeu : vérifie tous les permanents du
// même joueur qui surveillent l'apparition d'un sous-type précis (ou de
// n'importe lequel, si aucun sous-type n'a été précisé dans l'éditeur).
function fireSummonSubtypeTrigger(key, newCreature){
  const p = S[key];
  if(!p) return;
  const subtypes = (newCreature.subtypes||[]).map(s=>s.trim().toLowerCase());
  const sources = [
    ...p.board.map(c=>({source:c, isCreature:true})),
    p.hero ? {source:p.hero, isCreature:false} : null,
    ...(p.relics||[]).map(r=>({source:r, isCreature:false}))
  ].filter(Boolean);
  sources.forEach(({source, isCreature})=>{
    const eff = source.triggeredEffects && source.triggeredEffects.onSummonSubtype;
    if(!eff) return;
    if(eff._triggerSubtype && !subtypes.includes(eff._triggerSubtype.toLowerCase())) return;
    if(!conditionsMet(eff.conditions, p, key)) return;
    fireResolvedEffect(eff, p, key, isCreature?source:null, null, newCreature);
  });
}

function playCard(key, handIndex, targetInfo){
  const p = S[key];
  const card = p.hand[handIndex];
  if(!card) return false;
  const cost = effectiveCost(p, card);
  if(availableMana(p) < cost) return false;
  if(!canPayExtraCost(p, card)) return false;

  // Sacrifice : si le joueur humain a plus d'une créature possible, on lui demande laquelle
  if(key==='p1' && card.extraCostEnabled && card.extraCostType==='sacrificeCreature'
     && p.board.length>1 && !(targetInfo && targetInfo._sacrifice)){
    if(needsTarget(card) && !targetInfo) return 'needs-target'; // le ciblage du sort prime, résolu d'abord
    S.pendingSacrifice = { handIndex, targetInfo: targetInfo||null };
    log('Choisis la créature à sacrifier pour payer le coût additionnel.');
    render();
    return 'needs-sacrifice';
  }
  const chosenSacrifice = targetInfo && targetInfo._sacrifice;

  if(card.type==='Créature'){
    if(p.board.length>=8) return false;
    if(needsTarget(card) && !targetInfo){
      if(!hasValidTarget(card.onPlayEffect, key)) return 'no-valid-target';
      return 'needs-target';
    }
    spendMana(p, cost);
    p.hand.splice(handIndex,1);
    payExtraCost(key, p, card, chosenSacrifice);
    if(p.pendingDiscount && (p.pendingDiscount.cardType==='Toutes' || p.pendingDiscount.cardType===card.type)) p.pendingDiscount = null;
    const inst = instantiateCreature(card);
    p.board.push(inst);
    log(`${cardOwnerName(key)} invoque ${card.name}.`);
    if(card.onPlayEffect){
      if(card.onPlayEffect.type==='summonCopy'){
        const n = card.onPlayEffect.amount||1;
        let made = 0;
        for(let i=0;i<n && p.board.length<8;i++){ p.board.push(instantiateCreature(card)); made++; }
        log(`${cardOwnerName(key)} invoque ${made} copie(s) supplémentaire(s) de ${card.name}.`);
      } else {
        const selfTargetInfo = {isHeroTarget:false, creature:inst, player:p};
        if(card.onPlayEffect.targetOwner==='self' && TARGETED_EFFECTS.includes(card.onPlayEffect.type)){
          fireResolvedEffect(card.onPlayEffect, p, key, inst, selfTargetInfo, null);
        } else if(targetInfo && targetInfo.selfTarget){
          fireResolvedEffect(card.onPlayEffect, p, key, inst, selfTargetInfo, null);
        } else if(targetInfo){
          fireResolvedEffect(card.onPlayEffect, p, key, inst, targetInfo, null);
        } else if(!effectNeedsTarget(card.onPlayEffect)){
          fireResolvedEffect(card.onPlayEffect, p, key, inst, {}, null);
        }
      }
    }
    fireSummonSubtypeTrigger(key, inst);
    p.creaturesArrivedThisTurn = (p.creaturesArrivedThisTurn||0) + 1;
    fireWatchTrigger('watchPlay', key);
    triggerOpponentPlayTraps(key, card, inst);
  }
  else if(card.type==='Sortilège'){
    if(needsTarget(card) && !targetInfo){
      if(!hasValidTarget(card.effect, key)) return 'no-valid-target';
      return 'needs-target';
    }
    spendMana(p, cost);
    p.hand.splice(handIndex,1);
    payExtraCost(key, p, card, chosenSacrifice);
    if(p.pendingDiscount && (p.pendingDiscount.cardType==='Toutes' || p.pendingDiscount.cardType===card.type)) p.pendingDiscount = null;
    showCardReveal(card);
    fireResolvedEffect(card.effect, p, key, null, targetInfo || {}, null);
    p.discard.push(card);
    fireWatchTrigger('watchPlay', key);
    fireWatchTrigger('watchSpell', key);
    triggerOpponentPlayTraps(key, card, null);
  }
  else if(card.type==='Piège'){
    return setTrap(key, handIndex);
  }
  else if(card.type==='Artefact'){
    if(p.relics.length>=2) return false;
    if(needsTarget(card) && !targetInfo){
      const onPlayEff = card.triggeredEffects && card.triggeredEffects.onPlay;
      if(!hasValidTarget(onPlayEff, key)) return 'no-valid-target';
      return 'needs-target';
    }
    spendMana(p, cost);
    p.hand.splice(handIndex,1);
    payExtraCost(key, p, card, chosenSacrifice);
    if(p.pendingDiscount && (p.pendingDiscount.cardType==='Toutes' || p.pendingDiscount.cardType===card.type)) p.pendingDiscount = null;
    const relicInst = {...card, instId:nextId()};
    p.relics.push(relicInst);
    p.artifactsArrivedThisTurn = (p.artifactsArrivedThisTurn||0) + 1;
    fireWatchTrigger('watchPlay', key);
    log(`${cardOwnerName(key)} active ${card.name}.`);
    const onPlayEff = relicInst.triggeredEffects && relicInst.triggeredEffects.onPlay;
    if(onPlayEff && conditionsMet(onPlayEff.conditions, p, key)){
      if(onPlayEff.targetOwner==='self' && TARGETED_EFFECTS.includes(onPlayEff.type)){
        fireResolvedEffect(onPlayEff, p, key, null, {}, null);
      } else if(targetInfo){
        fireResolvedEffect(onPlayEff, p, key, null, targetInfo, null);
      } else if(!effectNeedsTarget(onPlayEff)){
        fireResolvedEffect(onPlayEff, p, key, null, {}, null);
      }
    }
    triggerOpponentPlayTraps(key, card, null);
  }
  render();
  return true;
}

function matchesNumericFilter(value, mode, target){
  if(value===null || value===undefined || !mode || mode==='any') return mode==='any' || !mode;
  const t = parseInt(target);
  if(mode==='exact') return value===t;
  if(mode==='atLeast') return value>=t;
  if(mode==='atMost') return value<=t;
  return true;
}

function findMatchingCards(pool, effect){
  let list = pool.slice();
  const val = effect.value!==undefined ? parseInt(effect.value) : null;
  switch(effect.criteria){
    case 'costExact': list = list.filter(c=>c.cost===val); break;
    case 'costLess': list = list.filter(c=>c.cost!=null && c.cost<=val); break;
    case 'costMore': list = list.filter(c=>c.cost!=null && c.cost>=val); break;
    case 'atkHigher': list = list.filter(c=>c.type==='Créature').sort((a,b)=>(b.atk||0)-(a.atk||0)); break;
    case 'atkLower': list = list.filter(c=>c.type==='Créature').sort((a,b)=>(a.atk||0)-(b.atk||0)); break;
    case 'hpHigher': list = list.filter(c=>c.type==='Créature').sort((a,b)=>(b.hp||0)-(a.hp||0)); break;
    case 'hpLower': list = list.filter(c=>c.type==='Créature').sort((a,b)=>(a.hp||0)-(b.hp||0)); break;
    case 'cardType': list = list.filter(c=>c.type===effect.cardType); break;
    case 'subtype': list = list.filter(c=>(c.subtypes||[]).includes(effect.subtype)); break;
    case 'hasKeyword': list = list.filter(c=>(c.keywords||[]).includes(effect.keyword)); break;
    case 'random': default: break;
  }
  return list;
}

function pickRandomAlly(p){
  if(p.board.length===0) return null;
  return p.board[Math.floor(Math.random()*p.board.length)];
}

function ownerTargets(effect, caster, casterKey, targetKey){
  const opp = S[targetKey];
  if(effect.owner==='enemy') return [{p:opp, key:targetKey}];
  if(effect.owner==='both') return [{p:caster, key:casterKey}, {p:opp, key:targetKey}];
  return [{p:caster, key:casterKey}];
}

function conditionsMet(conditions, caster, casterKey){
  if(!conditions || conditions.length===0) return true;
  return conditions.every(cond=>evalCondition(cond, caster, casterKey));
}

function resolveDynamicValue(key, caster, casterKey, sourceCreature, targetCreature){
  const oppKey = casterKey==='p1' ? 'p2' : 'p1';
  const opp = S[oppKey];
  switch(key){
    case 'thisAtk': return sourceCreature ? sourceCreature.curAtk : 0;
    case 'thisHp': return sourceCreature ? sourceCreature.curHp : 0;
    case 'targetAtk': return targetCreature ? targetCreature.curAtk : 0;
    case 'targetHp': return targetCreature ? targetCreature.curHp : 0;
    case 'handSize': return caster.hand.length;
    case 'discardSize': return caster.discard.length;
    case 'deckSize': return caster.deck.length;
    case 'manaRemaining': return availableMana(caster);
    case 'allyMaxMana': return caster.manaNormalMax;
    case 'enemyMaxMana': return opp.manaNormalMax;
    case 'creaturesInPlay': return caster.board.length;
    case 'artifactsInPlay': return caster.relics.length;
    case 'cardsDeadThisTurn': return (caster.creaturesDiedThisTurn||0)+(caster.artifactsDiedThisTurn||0);
    case 'cardsDrawnThisTurn': return caster.cardsDrawnThisTurn||0;
    case 'manaGainedThisTurn': return caster.manaGainedThisTurn||0;
    case 'hpLostThisTurn': return caster.hpLostThisTurn||0;
    case 'hpGainedThisTurn': return caster.hpGainedThisTurn||0;
    default: return 0; // valeurs paramétriques (type/zone, sous-type/zone, nom précis) pas encore résolues
  }
}

function conditionValue(cond, caster, casterKey){
  if(cond.valueMode==='dynamic') return resolveDynamicValue(cond.valueDynamic, caster, casterKey);
  const n = parseInt(cond.valueFixed ?? cond.value);
  return isNaN(n) ? 0 : n;
}

function compareValues(actual, mode, wanted){
  if(mode==='atMost') return actual<=wanted;
  if(mode==='exactly' || mode==='exact') return actual===wanted;
  return actual>=wanted; // atLeast par défaut
}

function evalCondition(cond, caster, casterKey){
  const oppKey = casterKey==='p1' ? 'p2' : 'p1';
  const val = conditionValue(cond, caster, casterKey);
  switch(cond.conditionType){
    case 'resourceCompare': {
      const p = cond.owner==='enemy' ? S[oppKey] : caster;
      const resource = {hp:p.hp, mana:availableMana(p), hand:p.hand.length, discard:p.discard.length, deck:p.deck.length, board:p.board.length}[cond.resourceType||'hp'];
      return compareValues(resource, cond.compareMode, val);
    }
    case 'healthChange': {
      const target = cond.healthChangeOwner==='enemy' ? S[oppKey] : caster;
      const amount = cond.healthChangeDirection==='gained' ? (target.hpGainedThisTurn||0) : (target.hpLostThisTurn||0);
      return cond.healthChangeMode==='exact' ? amount===val : amount>=val;
    }
    case 'drawnThisTurn': {
      const p = cond.owner==='enemy' ? S[oppKey] : caster;
      return compareValues(p.cardsDrawnThisTurn||0, cond.compareMode, val);
    }
    case 'countThisTurn': {
      const players = cond.owner==='both' ? [caster, S[oppKey]] : [cond.owner==='enemy' ? S[oppKey] : caster];
      const field = cond.countThisTurnType==='artifact'
        ? (cond.countThisTurnEvent==='arrived' ? 'artifactsArrivedThisTurn' : cond.countThisTurnEvent==='activated' ? 'artifactsActivatedThisTurn' : 'artifactsDiedThisTurn')
        : (cond.countThisTurnEvent==='arrived' ? 'creaturesArrivedThisTurn' : 'creaturesDiedThisTurn');
      const total = players.reduce((sum,p)=>sum+(p[field]||0), 0);
      return compareValues(total, cond.compareMode, val);
    }
    case 'boardEmpty': return S[oppKey].board.length===0;
    case 'subtypeCount': {
      const p = cond.owner==='enemy' ? S[oppKey] : caster;
      const zone = {board:p.board, hand:p.hand, discard:p.discard}[cond.subtypeZone||'board'] || [];
      const typeFilter = {creature:'Créature', artifact:'Artefact', sortilege:'Sortilège', piege:'Piège'}[cond.subtypeCardType];
      const matches = zone.filter(c=>{
        if(typeFilter && c.type!==typeFilter) return false;
        const subs = c.subtypes||[];
        if(!cond.subtype) return subs.length===0;
        return subs.some(s=>s.trim().toLowerCase()===cond.subtype.trim().toLowerCase());
      });
      return compareValues(matches.length, cond.compareMode, val);
    }
    case 'statCompare': {
      let stat = 0;
      if(cond.statScope==='anyBoard') stat = caster.board.length ? Math.max(...caster.board.map(c=>cond.statType==='endurance'?c.curHp:c.curAtk)) : 0;
      else if(cond.statScope==='anyHand') stat = caster.hand.filter(c=>c.type==='Créature').length ? Math.max(...caster.hand.filter(c=>c.type==='Créature').map(c=>cond.statType==='endurance'?c.hp:c.atk)) : 0;
      // 'target' : pas de cible garantie disponible au moment de l'évaluation de condition ; traité comme 0
      const comp = {greater:(a,b)=>a>b, less:(a,b)=>a<b, equal:(a,b)=>a===b}[cond.statCompareMode||'greater'];
      return comp(stat, val);
    }
    case 'turnAtLeast': return S.turn >= val;
    case 'chance': return Math.random() < val/100;
    case 'deckComposition': {
      const allCards = [...caster.hand, ...caster.deck, ...caster.discard, ...caster.board];
      const classes = new Set(allCards.map(c=>c.class).filter(c=>c && c!=='Neutre'));
      switch(cond.deckCompMode){
        case 'singleClassSpecific': return classes.size<=1 && (classes.size===0 || classes.has(cond.deckCompClass));
        case 'maxClasses': return classes.size <= (cond.deckCompValue||1);
        case 'minPerClass': {
          const counts = {};
          allCards.forEach(c=>{ if(c.class && c.class!=='Neutre') counts[c.class]=(counts[c.class]||0)+1; });
          return Object.values(counts).every(n=>n>=(cond.deckCompValue||1));
        }
        default: return classes.size<=1;
      }
    }
    // --- anciennes conditions retirées de l'éditeur, gardées pour les cartes déjà sauvegardées ---
    case 'healthBelow': return caster.hp < val;
    case 'handSizeAtLeast': return caster.hand.length >= val;
    case 'controlsSubtype': return caster.board.some(c=>(c.subtypes||[]).includes(cond.value));
    case 'handHasStatAtLeast': return caster.hand.some(c=>c.type==='Créature' && (c.atk||0)>=val);
    case 'monoColorDeck': {
      const allCards = [...caster.hand, ...caster.deck, ...caster.discard, ...caster.board];
      const classes = new Set(allCards.map(c=>c.class).filter(c=>c && c!=='Neutre'));
      return classes.size<=1;
    }
    case 'manaNotFromRegion':
    case 'custom':
      return true; // non interprétable par ce prototype, considéré comme rempli
    default: return true;
  }
}

function applySpellEffect(effect, caster, casterKey, target){
  if(!effect) return;
  if(!conditionsMet(effect.conditions, caster, casterKey)){
    log(`${cardOwnerName(casterKey)} : condition non remplie, l'effet ne se déclenche pas.`);
    render();
    return;
  }
  const targetKey = casterKey==='p1' ? 'p2' : 'p1';
  switch(effect.type){
    case 'damage': {
      const amt = effect.amount;
      if(target.isHeroTarget) dealDamageToHero(target.player, target.key, amt, caster);
      else {
        target.creature.curHp -= amt;
        spawnDamageNumber(document.querySelector(`[data-inst-id="${target.creature.instId}"]`), amt);
        fireCreatureTrigger(target.player===S.p1?'p1':'p2', target.creature, 'onDamaged');
        fireWatchTrigger('watchDamaged', target.player===S.p1?'p1':'p2');
      }
      log(`${cardOwnerName(casterKey)} inflige ${amt} dégâts.`);
      cleanupDeaths();
      break;
    }
    case 'heal':
      if(target && target.isHeroTarget){
        modifyHp(target.player, effect.amount);
        log(`${cardOwnerName(casterKey)} restaure ${effect.amount} PV à un héros.`);
      } else if(target && target.creature){
        target.creature.curHp = Math.min(target.creature.hp, target.creature.curHp + effect.amount);
        log(`${cardOwnerName(casterKey)} restaure ${effect.amount} PV à ${target.creature.name}.`);
        fireWatchTrigger('watchHealed', target.player===S.p1?'p1':'p2');
      } else {
        modifyHp(caster, effect.amount);
        log(`${cardOwnerName(casterKey)} récupère ${effect.amount} PV.`);
      }
      break;
    case 'stun':
      if(!target.isHeroTarget){
        target.creature.stunned = true;
        log(`${cardOwnerName(casterKey)} étourdit une créature ennemie.`);
      }
      break;
    case 'freeze':
      if(!target.isHeroTarget){
        target.creature.frozen = true;
        log(`${cardOwnerName(casterKey)} gèle une créature ennemie.`);
      }
      break;
    case 'destroy':
      if(!target.isHeroTarget){
        target.creature.curHp = -9999;
        log(`${cardOwnerName(casterKey)} détruit une créature ennemie.`);
        cleanupDeaths();
      }
      break;
    case 'silence':
      if(!target.isHeroTarget){
        const c = target.creature;
        const mode = effect.mode||'both';
        if(mode==='abilities' || mode==='both'){
          c.keywords = [];
          c.triggeredEffects = {};
          c.onPlayEffect = null; c.onReviveEffect = null;
        }
        if(mode==='buffs' || mode==='both'){
          c.curAtk = c.atk; c.curHp = c.hp;
        }
        log(`${cardOwnerName(casterKey)} retire ${mode==='abilities'?'les capacités':mode==='buffs'?'les bonus de stats':'les capacités et les bonus de stats'} de ${c.name}.`);
        cleanupDeaths();
      }
      break;
    case 'bounce':
      if(!target.isHeroTarget){
        const opp = S[targetKey];
        const c = target.creature;
        opp.board = opp.board.filter(x=>x.instId!==c.instId);
        opp.hand.push({ id:c.id, name:c.name, type:c.type, class:c.class, classSecondary:c.classSecondary,
          cost:c.cost, atk:c.atk, hp:c.hp, charges:c.charges, keywords:[...(c.keywords||[])], text:c.text, effect:c.effect });
        log(`${cardOwnerName(casterKey)} renvoie ${c.name} en main.`);
      }
      break;
    case 'draw': {
      const targets = ownerTargets(effect, caster, casterKey, casterKey==='p1'?'p2':'p1');
      targets.forEach(({p,key})=>{
        for(let i=0;i<effect.amount;i++) drawCard(p, key);
        log(`${cardOwnerName(key)} pioche ${effect.amount} carte${effect.amount>1?'s':''}.`);
      });
      break;
    }
    case 'buff': {
      const pool = target && target.creature ? null : (effect.targetOwner==='enemy' ? S[targetKey].board : caster.board);
      const c = (target && target.creature) ? target.creature : (pool && pool.length>0 ? pool[Math.floor(Math.random()*pool.length)] : null);
      if(c){
        c.curAtk = Math.max(0, c.curAtk + effect.atk); c.curHp += effect.hp;
        const s1 = (effect.atk>=0?'+':'')+effect.atk, s2 = (effect.hp>=0?'+':'')+effect.hp;
        log(`${cardOwnerName(casterKey)} modifie ${c.name} de ${s1}/${s2}.`);
        if(effect.atk>0 || effect.hp>0) fireWatchTrigger('watchBuffed', casterKey);
        cleanupDeaths();
      } else {
        log(`${cardOwnerName(casterKey)} n'a aucune créature à modifier.`);
      }
      break;
    }
    case 'resource': {
      const targets = ownerTargets(effect, caster, casterKey, casterKey==='p1'?'p2':'p1');
      targets.forEach(({p,key})=>{
        p.manaNormal += effect.amount;
        p.manaGainedThisTurn = (p.manaGainedThisTurn||0) + effect.amount;
        log(`${cardOwnerName(key)} gagne ${effect.amount} mana utilisable immédiatement.`);
      });
      break;
    }
    case 'emptyManaEffect': {
      const targets = ownerTargets(effect, caster, casterKey, casterKey==='p1'?'p2':'p1');
      targets.forEach(({p,key})=>gainEmptyMana(p, key, effect.amount));
      break;
    }
    case 'fragileManaEffect': {
      const targets = ownerTargets(effect, caster, casterKey, casterKey==='p1'?'p2':'p1');
      targets.forEach(({p,key})=>gainFragileMana(p, key, effect.amount));
      break;
    }
    case 'refillMana': {
      const targets = ownerTargets(effect, caster, casterKey, casterKey==='p1'?'p2':'p1');
      targets.forEach(({p,key})=>{
        p.manaNormal = p.manaNormalMax;
        log(`${cardOwnerName(key)} recharge tout son mana disponible.`);
      });
      break;
    }
    case 'discardSelf': {
      let n = Math.min(effect.amount, caster.hand.length);
      for(let i=0;i<n;i++){
        const idx = Math.floor(Math.random()*caster.hand.length);
        caster.discard.push(caster.hand.splice(idx,1)[0]);
      }
      log(`${cardOwnerName(casterKey)} défausse ${n} carte${n>1?'s':''}.`);
      break;
    }
    case 'setStat': {
      const ownerP = effect.owner==='enemy' ? S[targetKey] : caster;
      if(effect.target==='charges'){
        ownerP.relics.forEach(r=>{ r.charges = effect.value; });
      } else if(effect.target==='cost'){
        const list = effect.scope==='hand' ? ownerP.hand : effect.scope==='deck' ? ownerP.deck : [];
        list.forEach(c=>{ c.cost = effect.value; });
      } else if(effect.target==='force'){
        if(effect.scope==='board') ownerP.board.forEach(c=>{ c.curAtk=effect.value; });
        else if(effect.scope==='hand') ownerP.hand.forEach(c=>{ if(c.type==='Créature') c.atk=effect.value; });
        else if(effect.scope==='deck') ownerP.deck.forEach(c=>{ if(c.type==='Créature') c.atk=effect.value; });
      } else if(effect.target==='endurance'){
        if(effect.scope==='board') ownerP.board.forEach(c=>{ c.curHp=effect.value; });
        else if(effect.scope==='hand') ownerP.hand.forEach(c=>{ if(c.type==='Créature') c.hp=effect.value; });
        else if(effect.scope==='deck') ownerP.deck.forEach(c=>{ if(c.type==='Créature') c.hp=effect.value; });
      }
      log(`${cardOwnerName(casterKey)} fixe une statistique à ${effect.value}.`);
      cleanupDeaths();
      break;
    }
    case 'removeArtifactCharges': {
      const ownerP = effect.targetOwner==='enemy' ? S[targetKey] : caster;
      if(ownerP.relics.length>0){
        const r = ownerP.relics[Math.floor(Math.random()*ownerP.relics.length)];
        r.charges = Math.max(0, r.charges - effect.amount);
        log(`${cardOwnerName(casterKey)} retire ${effect.amount} utilisation(s) à ${r.name}.`);
        const deadR = ownerP.relics.filter(x=>x.charges<=0);
        ownerP.discard.push(...deadR);
        ownerP.artifactsDiedThisTurn = (ownerP.artifactsDiedThisTurn||0) + deadR.length;
        ownerP.relics = ownerP.relics.filter(x=>x.charges>0);
      } else {
        log(`${cardOwnerName(casterKey)} : aucun artefact à cibler.`);
      }
      break;
    }
    case 'sacrificeEffect': {
      const ownerP = effect.targetOwner==='enemy' ? S[targetKey] : caster;
      if(ownerP.board.length>0){
        const c = ownerP.board[Math.floor(Math.random()*ownerP.board.length)];
        c.curHp = 0;
        log(`${cardOwnerName(casterKey)} sacrifie ${c.name}.`);
        cleanupDeaths();
      } else {
        log(`${cardOwnerName(casterKey)} : aucune créature à sacrifier.`);
      }
      break;
    }
    case 'setStats': {
      const ownerP = effect.owner==='enemy' ? S[targetKey] : caster;
      if(effect.scope==='board'){
        ownerP.board.forEach(c=>{ c.curAtk=effect.atk; c.curHp=effect.hp; });
      } else if(effect.scope==='hand'){
        ownerP.hand.forEach(c=>{ if(c.type==='Créature'){ c.atk=effect.atk; c.hp=effect.hp; } });
      } else if(effect.scope==='deck'){
        ownerP.deck.forEach(c=>{ if(c.type==='Créature'){ c.atk=effect.atk; c.hp=effect.hp; } });
      }
      log(`${cardOwnerName(casterKey)} fixe des statistiques à ${effect.atk}/${effect.hp}.`);
      cleanupDeaths();
      break;
    }
    case 'upgrade': {
      const c = pickRandomAlly(caster);
      if(c){
        const pool = Object.keys(KEYWORD_LABELS).filter(k=>!c.keywords.includes(k));
        if(pool.length>0){
          const kw = pool[Math.floor(Math.random()*pool.length)];
          c.keywords.push(kw);
          log(`${c.name} gagne aléatoirement ${KEYWORD_LABELS[kw]}.`);
        }
      } else log(`${cardOwnerName(casterKey)} n'a aucune créature à améliorer.`);
      break;
    }
    case 'grantKeyword': {
      const c = (target && target.creature) ? target.creature : (effect.targetOwner==='enemy' ? S[targetKey].board : caster.board)[0];
      if(c){
        if(!c.keywords.includes(effect.keyword)) c.keywords.push(effect.keyword);
        if(effect.duration==='thisTurn'){ c._tempKeywords = c._tempKeywords||[]; c._tempKeywords.push(effect.keyword); }
        log(`${c.name} obtient ${KEYWORD_LABELS[effect.keyword]||effect.keyword}${effect.duration==='thisTurn'?' ce tour-ci':''}.`);
      } else log(`${cardOwnerName(casterKey)} n'a aucune créature à qui donner ce mot-clé.`);
      break;
    }
    case 'keywordChoice': {
      const c = (target && target.creature) ? target.creature : (effect.targetOwner==='enemy' ? S[targetKey].board : caster.board)[0];
      if(!c){ log(`${cardOwnerName(casterKey)} n'a aucune créature disponible.`); break; }
      const allKw = Object.keys(KEYWORD_LABELS).filter(k=>!c.keywords.includes(k));
      const options = shuffle(allKw).slice(0,3);
      if(options.length===0){ log('Aucun mot-clé disponible.'); break; }
      if(casterKey==='p2' || options.length===1){
        c.keywords.push(options[0]);
        log(`${c.name} obtient ${KEYWORD_LABELS[options[0]]}.`);
      } else {
        openKeywordChoice(c, options);
        return;
      }
      break;
    }
    case 'reduceCostAura': {
      const targetP = effect.owner==='enemy' ? S[targetKey] : caster;
      const targetPKey = effect.owner==='enemy' ? targetKey : casterKey;
      if(!targetP.activeCostReductions) targetP.activeCostReductions = [];
      targetP.activeCostReductions.push({ cardType: effect.cardType, subtype: effect.subtype, amount: effect.amount });
      const typeLabel = effect.cardType && effect.cardType!=='any' ? `les cartes de type ${effect.cardType}` : 'toutes les cartes';
      const subLabel = effect.subtype ? ` du sous-type ${effect.subtype}` : '';
      log(`${cardOwnerName(targetPKey)} : ${typeLabel}${subLabel} coûtent désormais ${effect.amount} de moins.`);
      break;
    }
    case 'explore': {
      const targetP = effect.owner==='enemy' ? S[targetKey] : caster;
      let n = 0;
      for(let i=0;i<effect.amount;i++){
        if(targetP.deck.length===0) break;
        targetP.discard.push(targetP.deck.shift());
        n++;
      }
      log(`${cardOwnerName(casterKey)} explore ${n} carte${n>1?'s':''} ${effect.owner==='enemy'?'du deck adverse':'de son deck'}.`);
      if(n>0) fireWatchTrigger('watchExplore', casterKey);
      break;
    }
    case 'retrieve': {
      const doOnce = ()=>{
        const source = effect.source==='discard' ? caster.discard : caster.deck;
        const matches = findMatchingCards(source, effect);
        if(matches.length===0) return false;
        const chosen = effect.criteria==='random' ? matches[Math.floor(Math.random()*matches.length)] : matches[0];
        const idx = source.indexOf(chosen);
        if(idx>=0) source.splice(idx,1);
        let retrievedInst = null;
        if(effect.destination==='battlefield' && chosen.type==='Créature' && caster.board.length<8){
          retrievedInst = instantiateCreature(chosen);
          if(effect.atkBonus) retrievedInst.curAtk = Math.max(0, retrievedInst.curAtk + effect.atkBonus);
          if(effect.hpBonus) retrievedInst.curHp += effect.hpBonus;
          if(effect.keywordGrant && !retrievedInst.keywords.includes(effect.keywordGrant)) retrievedInst.keywords.push(effect.keywordGrant);
          caster.board.push(retrievedInst);
          fireSummonSubtypeTrigger(casterKey, retrievedInst);
        } else {
          caster.hand.push(chosen);
        }
        log(`${cardOwnerName(casterKey)} récupère ${chosen.name}.`);
        if(effect.source==='discard'){
          firePermanentTriggers(casterKey, 'onReturnFromGraveyard', retrievedInst);
          fireWatchTrigger('watchFromDiscard', casterKey, retrievedInst);
          fireWatchTrigger('watchRetrieveDiscard', casterKey, retrievedInst);
        } else {
          fireWatchTrigger('watchFromDeck', casterKey, retrievedInst);
          fireWatchTrigger('watchRetrieveDeck', casterKey, retrievedInst);
        }
        return true;
      };
      if(effect.repeat==='asManyAsPossible'){
        let cont = true, guard = 0;
        while(cont && guard<25){ cont = doOnce(); guard++; }
      } else {
        if(!doOnce()) log(`${cardOwnerName(casterKey)} ne trouve rien à récupérer.`);
      }
      cleanupDeaths();
      break;
    }
    case 'discover': {
      const matches = findMatchingCards(caster.deck, effect);
      const options = effect.criteria==='random' ? shuffle(matches).slice(0,3) : matches.slice(0,3);
      if(options.length===0){ log(`${cardOwnerName(casterKey)} ne trouve rien à réveler.`); break; }
      if(casterKey==='p2' || options.length===1){
        pickDiscoverOption(caster, casterKey, options[0]);
      } else {
        openDiscoverChoice(caster, casterKey, options);
        return;
      }
      break;
    }
    case 'conjure': {
      let chosenRaw = null;
      if(effect.mode==='specific'){
        chosenRaw = ACTIVE_CARD_POOL.find(c=>c.name===effect.specificName);
      } else {
        let pool = ACTIVE_CARD_POOL.filter(c=>(effect.types||[]).includes(c.type));
        if(effect.class && effect.class!=='any') pool = pool.filter(c=>c.class===effect.class || c.classSecondary===effect.class);
        if(effect.subtype) pool = pool.filter(c=>(c.subtypes||[]).includes(effect.subtype));
        pool = pool.filter(c=>matchesNumericFilter(c.cost, effect.costMode, effect.costValue));
        pool = pool.filter(c=>matchesNumericFilter(c.atk, effect.atkMode, effect.atkValue));
        pool = pool.filter(c=>matchesNumericFilter(c.hp, effect.hpMode, effect.hpValue));
        if(pool.length>0) chosenRaw = pool[Math.floor(Math.random()*pool.length)];
      }
      if(!chosenRaw){ log(`${cardOwnerName(casterKey)} ne trouve rien à conjurer.`); break; }
      const baseCard = normalizeCardForPool(chosenRaw);
      const targets = ownerTargets(effect, caster, casterKey, casterKey==='p1'?'p2':'p1');
      const qty = Math.max(1, effect.quantity||1);
      targets.forEach(({p,key})=>{
        for(let i=0;i<qty;i++){
          let card = {...baseCard, keywords:[...(baseCard.keywords||[])], subtypes:[...(baseCard.subtypes||[])]};
          if(effect.followUp && effect.followUp.enabled){
            if(effect.followUp.type==='buff') card = {...card, atk:(card.atk||0)+effect.followUp.atk, hp:(card.hp||0)+effect.followUp.hp};
            else if(effect.followUp.type==='grantKeyword') card = {...card, keywords:[...(card.keywords||[]), effect.followUp.keyword]};
          }
          if(effect.destination==='battlefield' && card.type==='Créature' && p.board.length<8){
            const conjuredInst = instantiateCreature(card);
            p.board.push(conjuredInst);
            fireSummonSubtypeTrigger(key, conjuredInst);
          } else {
            p.hand.push(card);
          }
          log(`${cardOwnerName(key)} conjure ${card.name}.`);
          fireWatchTrigger('watchConjured', key);
        }
      });
      break;
    }
    case 'fight': {
      const a = pickRandomAlly(caster), b = pickRandomAlly(S[targetKey]);
      if(!a || !b){ log('Pas assez de créatures pour un combat forcé.'); break; }
      a.curHp -= b.curAtk; b.curHp -= a.curAtk;
      log(`${cardOwnerName(casterKey)} force ${a.name} et ${b.name} à se battre.`);
      cleanupDeaths();
      break;
    }
    case 'coinFlip': {
      const ownerP = effect.owner==='enemy' ? S[targetKey] : caster;
      const zap = (c)=>{
        if(effect.successEffect==='destroy') c.curHp = -9999;
        else c.curHp -= (effect.successValue||1);
      };
      if(effect.selection==='all'){
        ownerP.board.slice().forEach(c=>{ if(Math.random()<0.5){ zap(c); log(`Pile ou face : ${c.name} tire un résultat défavorable.`); } });
      } else {
        const c = pickRandomAlly(ownerP);
        if(c && Math.random()<0.5){ zap(c); log(`Pile ou face : ${c.name} tire un résultat défavorable.`); }
      }
      cleanupDeaths();
      break;
    }
  }
  render();
}

/* ============================================================
   POUVOIR DE HÉROS
   ============================================================ */
function useHeroPower(key, targetInfo){
  const p = S[key];
  const hero = p.hero;
  if(!hero.activeEffect || availableMana(p) < hero.activeCost || p.heroCooldown>0) return;
  const needsT = effectNeedsTarget(hero.activeEffect);
  if(needsT && !targetInfo) return 'needs-target';
  spendMana(p, hero.activeCost);
  p.heroCooldown = hero.activeCooldownMax;
  fireResolvedEffect(hero.activeEffect, p, key, null, targetInfo || {}, null);
  log(`${cardOwnerName(key)} active son pouvoir de héros.`);
  render();
}

/* ============================================================
   PHASE DE COMBAT
   ============================================================ */
function toggleAttacker(instId){
  if(S.phase!=='declareAttackers') return;
  const idx = S.selectedAttackers.indexOf(instId);
  if(idx>=0) S.selectedAttackers.splice(idx,1);
  else S.selectedAttackers.push(instId);
  render();
}

function enterDeclareAttackers(){
  const p = S[S.active];
  const eligible = p.board.filter(c=>!c.frozen && !c.stunned && !c.keywords.includes('protecteur') && (!c.summonSick || c.keywords.includes('charge')) && !c.hasAttacked);
  if(eligible.length===0){
    log('Aucune créature ne peut attaquer : combat automatiquement passé.');
    S.attackPhaseDone = true;
    render();
    return;
  }
  S.phase = 'declareAttackers';
  S.selectedAttackers = [];
  render();
}

function confirmAttackers(){
  const atkKey = S.active, defKey = S.active==='p1' ? 'p2' : 'p1';
  const p = S[atkKey];
  const ids = S.selectedAttackers || [];
  S.phase = 'main';
  S.attackPhaseDone = true;
  if(ids.length===0){
    log('Vous ne déclarez aucun attaquant. Pas de combat ce tour-ci.');
    render();
    return;
  }
  p.attackers = ids;
  ids.forEach(id=>{
    const c = p.board.find(x=>x.instId===id);
    if(c){ c.hasAttacked = true; fireCreatureTrigger(atkKey, c, 'onAttack'); fireWatchTrigger('watchAttack', atkKey); }
  });
  log(`${cardOwnerName(atkKey)} déclare ${ids.length} attaquant(s).`);
  const firstTarget = p.board.find(x=>x.instId===ids[0]);
  fireTrap(defKey, 'onOpponentAttack', firstTarget);
  S.phase = 'declareBlockersWait';
  render();
  if(S[defKey].isAI){
    setTimeout(()=>aiDeclareBlocks(defKey, atkKey), 700);
  } else if(S[defKey].board.length>0){
    S.phase = 'declareBlockersMe';
    S.pendingBlocker = null;
    render();
  } else {
    resolveCombat(atkKey, defKey);
  }
}

function fireTrap(ownerKey, triggerType, target){
  const p = S[ownerKey];
  const idx = p.hand.findIndex(c=>c.activeTrap && (c.trapTrigger||'onOpponentAttack')===triggerType);
  if(idx<0) return;
  const trap = p.hand[idx];
  if(trap.effect && !conditionsMet(trap.effect.conditions, p, ownerKey)) return; // condition non remplie : le piège reste armé, retentera plus tard
  p.hand.splice(idx,1);
  p.discard.push(trap);
  log(`${cardOwnerName(ownerKey)} déclenche ${trap.name} ! (${trap.reservedMana||trap.cost} mana réservé consommé)`);
  trap.activeTrap = false; trap.reservedMana = undefined;
  showCardReveal(trap);
  fireWatchTrigger('watchTrap', ownerKey);
  if(trap.effect){
    if(target && effectNeedsTarget(trap.effect)){
      const targetPlayer = p.board && p.board.includes && p.board.includes(target) ? p : S[ownerKey==='p1'?'p2':'p1'];
      fireResolvedEffect(trap.effect, p, ownerKey, null, {isHeroTarget:false, creature:target, player:targetPlayer}, null);
    } else {
      fireResolvedEffect(trap.effect, p, ownerKey, null, null, target);
    }
  }
  render();
}

function aiDeclareBlocks(defKey, atkKey){
  const defP = S[defKey], atkP = S[atkKey];
  defP.blocks = {};
  const used = new Set();
  atkP.attackers.forEach(attId=>{
    const attacker = atkP.board.find(c=>c.instId===attId);
    if(!attacker) return;
    const eligible = defP.board.filter(b=>{
      if(used.has(b.instId) || b.frozen || b.stunned || b.keywords.includes('fearful')) return false;
      if(attacker.keywords.includes('flying') && !(b.keywords.includes('flying')||b.keywords.includes('reach'))) return false;
      return true;
    });
    if(eligible.length===0) return;
    let choice = eligible.find(b=>b.curAtk>=attacker.curHp && b.curHp>attacker.curAtk);
    if(!choice && defP.hp<=10) choice = [...eligible].sort((a,b)=>b.curAtk-a.curAtk)[0];
    if(choice){ defP.blocks[attId]=choice.instId; used.add(choice.instId); }
  });
  log(`L'adversaire déclare ses blocages.`);
  Object.keys(defP.blocks).forEach(attId=>{
    const attacker = atkP.board.find(c=>c.instId===attId);
    if(attacker) fireTrap(atkKey, 'onAllyBlocked', attacker);
  });
  resolveCombat(atkKey, defKey);
}

function resolveCombat(atkKey, defKey){
  const atkP = S[atkKey], defP = S[defKey];
  // ordre gauche à droite = ordre d'apparition sur le plateau (identique au rendu du couloir)
  const orderedAttackerIds = atkP.board.map(c=>c.instId).filter(id=>(atkP.attackers||[]).includes(id));

  suppressDamagePopups = true;
  const events = [];
  orderedAttackerIds.forEach(attId=>{
    const attacker = atkP.board.find(c=>c.instId===attId);
    if(!attacker) return;
    const blockerId = defP.blocks[attId];
    if(blockerId){
      const blocker = defP.board.find(c=>c.instId===blockerId);
      if(blocker){
        const res = resolveOneCombat(attacker, atkP, atkKey, blocker, defP, defKey);
        events.push({type:'clash', attackerInstId:attId, blockerInstId:blockerId, dmgToBlocker:res.dmgToBlocker, dmgToAttacker:res.dmgToAttacker});
      }
    } else {
      const dmg = attacker.curAtk;
      dealDamageToHero(defP, defKey, dmg, atkP);
      if(attacker.keywords.includes('lifesteal')) modifyHp(atkP, dmg);
      log(`${attacker.name} frappe le héros pour ${dmg}.`);
      events.push({type:'hero', attackerInstId:attId, defKey, dmg});
    }
  });
  suppressDamagePopups = false;

  playCombatSequence(events, ()=>{
    cleanupDeaths();
    atkP.attackers = [];
    defP.blocks = {};
    S.phase='main';
    render();
    if(atkKey==='p2' && !S.gameOver){
      setTimeout(()=>{ if(!S.gameOver) endTurn(); }, 400);
    }
  });
}

const COMBAT_STAGGER_MS = 950;

function playCombatSequence(events, onDone){
  if(events.length===0){ onDone(); return; }
  events.forEach((ev,i)=>{ setTimeout(()=>playOneCombatEvent(ev), i*COMBAT_STAGGER_MS); });
  setTimeout(onDone, events.length*COMBAT_STAGGER_MS + 1200);
}

function playOneCombatEvent(ev){
  const attEl = document.querySelector(`[data-inst-id="${ev.attackerInstId}"]`);
  if(ev.type==='clash'){
    const blkEl = document.querySelector(`[data-inst-id="${ev.blockerInstId}"]`);
    lungeToward(attEl, blkEl, 420);
    lungeToward(blkEl, attEl, 420);
    setTimeout(()=>{
      if(ev.dmgToBlocker) spawnDamageNumber(blkEl, ev.dmgToBlocker);
      if(ev.dmgToAttacker) spawnDamageNumber(attEl, ev.dmgToAttacker);
    }, 320);
  } else if(ev.type==='hero'){
    const heroEl = document.querySelector(`#hero-${ev.defKey} .hero-portrait`);
    lungeToward(attEl, heroEl, 420);
    setTimeout(()=>{ spawnDamageNumber(heroEl, ev.dmg); }, 320);
  }
}

function resolveOneCombat(attacker, atkP, atkKey, blocker, defP, defKey){
  log(`${attacker.name} affronte ${blocker.name}.`);
  const initA = attacker.keywords.includes('initiative');
  const initB = blocker.keywords.includes('initiative');
  let dmgToBlocker = 0, dmgToAttacker = 0;
  if(initA && !initB){
    dmgToBlocker = applyDamage(attacker, atkP, atkKey, blocker, defP, defKey);
    if(blocker.curHp>0) dmgToAttacker = applyDamage(blocker, defP, defKey, attacker, atkP, atkKey);
  } else if(initB && !initA){
    dmgToAttacker = applyDamage(blocker, defP, defKey, attacker, atkP, atkKey);
    if(attacker.curHp>0) dmgToBlocker = applyDamage(attacker, atkP, atkKey, blocker, defP, defKey);
  } else {
    dmgToBlocker = applyDamage(attacker, atkP, atkKey, blocker, defP, defKey);
    dmgToAttacker = applyDamage(blocker, defP, defKey, attacker, atkP, atkKey);
  }
  return {dmgToBlocker, dmgToAttacker};
}

/* ============================================================
   BLOCAGE — quand c'est l'IA qui attaque
   ============================================================ */
function beginPlayerBlock(myCreatureInstId){
  if(S.phase!=='declareBlockersMe') return;
  const c = S.p1.board.find(x=>x.instId===myCreatureInstId);
  if(c && c.hasBlockedThisTurn){
    log(`${c.name} a déjà combattu ce tour-ci, elle ne peut plus bloquer.`);
    return;
  }
  S.pendingBlocker = myCreatureInstId;
  updateTip();
}
function assignBlock(attackerInstId){
  if(S.phase!=='declareBlockersMe' || !S.pendingBlocker) return;
  const blocker = S.p1.board.find(c=>c.instId===S.pendingBlocker);
  const attacker = S.p2.board.find(c=>c.instId===attackerInstId);
  if(!blocker || !attacker) return;
  if(blocker.hasBlockedThisTurn){
    S.pendingBlocker=null; render(); return;
  }
  if(blocker.keywords.includes('fearful')){
    log(`${blocker.name} est Peureux et ne peut pas bloquer.`);
    S.pendingBlocker=null; render(); return;
  }
  if(attacker.keywords.includes('flying') && !(blocker.keywords.includes('flying')||blocker.keywords.includes('reach'))){
    log(`${blocker.name} ne peut pas bloquer une créature volante (il faut Vol ou Portée).`);
    S.pendingBlocker=null; render(); return;
  }
  const atkKey = S.active, defKey = S.active==='p1' ? 'p2' : 'p1';
  const atkP = S[atkKey], defP = S[defKey];
  fireTrap(atkKey, 'onAllyBlocked', attacker);

  // le combat se résout immédiatement, avec les stats actuelles des deux créatures
  suppressDamagePopups = true;
  const res = resolveOneCombat(attacker, atkP, atkKey, blocker, defP, defKey);
  suppressDamagePopups = false;

  attacker.hasBeenBlocked = true;
  blocker.hasBlockedThisTurn = true;
  S.pendingBlocker = null;

  const attEl = document.querySelector(`[data-inst-id="${attacker.instId}"]`);
  const blkEl = document.querySelector(`[data-inst-id="${blocker.instId}"]`);
  if(attEl && blkEl){
    lungeToward(attEl, blkEl, 420);
    lungeToward(blkEl, attEl, 420);
    setTimeout(()=>{
      if(res.dmgToBlocker) spawnDamageNumber(blkEl, res.dmgToBlocker);
      if(res.dmgToAttacker) spawnDamageNumber(attEl, res.dmgToAttacker);
    }, 320);
  }
  setTimeout(()=>{ cleanupDeaths(); render(); }, 500);
  render();
}
function anyBlockerAvailable(){
  return S.p1.board.some(c=>!c.hasBlockedThisTurn && !c.frozen && !c.stunned);
}
function finishBlocking(){
  if(S.phase!=='declareBlockersMe') return; // déjà validé une fois, un second clic (double-clic) ne fait rien
  S.phase = 'resolvingCombat'; // verrouille immédiatement, avant tout traitement asynchrone
  const atkKey = S.active, defKey = S.active==='p1' ? 'p2' : 'p1';
  const atkP = S[atkKey], defP = S[defKey];
  const orderedAttackerIds = atkP.board.map(c=>c.instId).filter(id=>(atkP.attackers||[]).includes(id));

  suppressDamagePopups = true;
  const events = [];
  orderedAttackerIds.forEach(attId=>{
    const attacker = atkP.board.find(c=>c.instId===attId);
    if(!attacker || attacker.hasBeenBlocked) return; // déjà combattu au moins une fois : jamais de dégâts au héros
    const dmg = attacker.curAtk;
    dealDamageToHero(defP, defKey, dmg, atkP);
    if(attacker.keywords.includes('lifesteal')) modifyHp(atkP, dmg);
    log(`${attacker.name} frappe le héros pour ${dmg}.`);
    events.push({type:'hero', attackerInstId:attId, defKey, dmg});
  });
  suppressDamagePopups = false;

  playCombatSequence(events, ()=>{
    cleanupDeaths();
    atkP.attackers = [];
    atkP.board.forEach(c=>{ c.hasBeenBlocked = false; });
    defP.board.forEach(c=>{ c.hasBlockedThisTurn = false; });
    S.phase='main';
    render();
    if(atkKey==='p2' && !S.gameOver){
      setTimeout(()=>{ if(!S.gameOver) endTurn(); }, 400);
    }
  });
}

/* ============================================================
   IA — tour complet
   ============================================================ */
function runAI(){
  if(S.gameOver) return;
  const p = S.p2, opp = S.p1;

  let played = true;
  while(played){
    played = false;
    const options = p.hand
      .map((c,idx)=>({c,idx}))
      .filter(o=>o.c.type==='Créature' && o.c.cost<=availableMana(p) && canPayExtraCost(p, o.c))
      .sort((a,b)=>b.c.cost-a.c.cost);
    if(options.length){ playCard('p2', options[0].idx); played = true; }
  }

  const spellIdx = p.hand.findIndex(c=>c.type==='Sortilège' && c.cost<=availableMana(p) && canPayExtraCost(p, c));
  if(spellIdx>=0){
    const card = p.hand[spellIdx];
    const eff = card.effect;
    if(eff){
      if(eff.type==='heal'){
        if(p.hp < p.hero.hp*0.6) playCard('p2', spellIdx);
      } else if(effectNeedsTarget(eff)){
        const validTarget = opp.board.find(c=>isTargetableCreature(c, false));
        if(validTarget) playCard('p2', spellIdx, {isHeroTarget:false, creature:validTarget, player:opp});
        else if(eff.type==='damage') playCard('p2', spellIdx, {isHeroTarget:true, player:opp, key:'p1'});
      } else {
        // effet sans cible (pioche, renforcement, mana, défausse...) : toujours bénéfique à jouer
        playCard('p2', spellIdx);
      }
    }
  }
  const relicIdx = p.hand.findIndex(c=>c.type==='Artefact' && c.cost<=availableMana(p) && canPayExtraCost(p, c));
  if(relicIdx>=0 && p.relics.length<2) playCard('p2', relicIdx);
  const trapIdx = p.hand.findIndex(c=>c.type==='Piège' && effectiveCost(p,c)<=availableMana(p) && canPayExtraCost(p, c));
  if(trapIdx>=0 && !p.hand.some(c=>c.pendingTrap||c.activeTrap)) setTrap('p2', trapIdx);

  const hero = p.hero;
  if(hero.activeEffect && availableMana(p)>=hero.activeCost && p.heroCooldown===0){
    if(effectNeedsTarget(hero.activeEffect)){
      const validTarget = opp.board.find(c=>isTargetableCreature(c, true));
      if(validTarget) useHeroPower('p2', {isHeroTarget:false, creature:validTarget, player:opp});
      else if(hero.activeEffect.type==='damage') useHeroPower('p2', {isHeroTarget:true, player:opp, key:'p1'});
    } else {
      useHeroPower('p2', {});
    }
  }

  render();
  setTimeout(()=>{
    const eligible = p.board.filter(c=>!c.frozen && !c.stunned && !c.keywords.includes('protecteur') && (!c.summonSick || c.keywords.includes('charge')) && !c.hasAttacked);
    if(eligible.length===0){ endTurn(); return; }
    p.attackers = eligible.map(c=>c.instId);
    eligible.forEach(c=>{ c.hasAttacked=true; fireCreatureTrigger('p2', c, 'onAttack'); });
    fireWatchTrigger('watchAttack', 'p2');
    log(`L'adversaire déclare ${eligible.length} attaquant(s).`);
    fireTrap('p1', 'onOpponentAttack', eligible[0]);
    render();
    if(S.p1.board.length>0){
      S.phase='declareBlockersMe';
      S.pendingBlocker=null;
      render();
    } else {
      resolveCombat('p2','p1');
    }
  }, 700);
}

/* ============================================================
   FIN DE PARTIE
   ============================================================ */
function endGame(winnerKey){
  S.gameOver = true;
  S.winnerKey = winnerKey;
}

   RENDU

function cardEl(card, opts={}){
  const el = document.createElement('div');
  el.className = `card class-${card.class||'Neutre'}`;
  if(opts.selected) el.classList.add('selected');
  if(opts.attacking) el.classList.add('attacking');
  if(opts.targetable) el.classList.add('targetable');
  const inPlay = !!opts.inPlay;
  if(inPlay && card.frozen) el.classList.add('frozen');
  if(inPlay && card.stunned) el.classList.add('stunned');
  const isSick = inPlay && card.summonSick && !card.keywords?.includes('charge');
  if(inPlay && opts.attackSelecting) el.classList.add('attack-selecting');
  if(isSick) el.classList.add('summon-sick');
  const kw = card.keywords || [];
  if(inPlay){
    if(kw.includes('fearful')) el.classList.add('kw-fearful');
    if(kw.includes('flying')) el.classList.add('kw-flying');
    if(kw.includes('stealth')) el.classList.add('kw-stealth');
    if(kw.includes('initiative')) el.classList.add('kw-initiative');
    if(kw.includes('lifesteal')) el.classList.add('kw-lifesteal');
  }

  const hasArmorShield = inPlay && kw.includes('armor') && !card.armorUsed;
  const activeKeywordIcons = inPlay ? kw.filter(k=>KEYWORD_ICON_FILES[k]) : [];

  const kwText = kw.map(k=>KEYWORD_LABELS[k]).filter(Boolean).join(', ');
  const isHero = card.type==='Héros';
  const isRegion = card.type==='Région';
  const isCreature = card.type==='Créature';
  const posX = card.imagePosX ?? 50, posY = card.imagePosY ?? 50, zoom = card.imageZoom ?? 100;
  const sizeVal = zoom>100 ? zoom+'%' : 'cover';
  const artStyle = card.image ? `background-image:url('${card.image.replace(/'/g,"")}');background-position:${posX}% ${posY}%;background-size:${sizeVal};` : '';
  const setInitial = card.set ? card.set.trim().charAt(0).toUpperCase() : '✦';

  el.innerHTML = `
    <div class="card-art" style="${artStyle}">
      ${(isHero || isRegion) ? '' : `<div class="card-cost">${opts.displayCost ?? card.cost ?? 0}</div>`}
      ${isHero ? `<div class="card-hero-hp">${card.curHp ?? card.hp ?? 0}</div>` : ''}
    </div>
    <div class="card-divider"><div class="card-set-icon">${card.setLogo ? `<div class="card-set-logo-img" style="background-image:url('${card.setLogo.replace(/'/g,"")}')"></div>` : `<span>${escapeHtmlGS(setInitial)}</span>`}</div></div>
    <div class="card-body">
      <div class="card-name">${escapeHtmlGS(card.name||'')}</div>
      <div class="card-kw">${escapeHtmlGS(kwText)}</div>
      <div class="card-text">${escapeHtmlGS(card.text||'')}</div>
    </div>
    <div class="card-footer">
      ${isCreature ? `<div class="card-atk"><img class="atk-icon" src="images/kw-attaque.png">${card.curAtk ?? card.atk ?? 0}</div>` : `<div></div>`}
      <div class="card-rarity-gem rarity-${card.rarity||'Commune'}" title="${card.rarity||'Commune'}"></div>
      ${isCreature ? `<div class="card-hp">♥${card.curHp ?? card.hp ?? 0}</div>` : `<div></div>`}
    </div>
    ${card.charges!==undefined ? `<div class="charges">${card.charges}x</div>` : ''}
    ${isSick ? `<div class="zzz"><span>Z</span><span>Z</span><span>Z</span></div>` : ''}
    ${hasArmorShield ? `<div class="card-armor-shield" title="Armure"></div>` : ''}
    ${activeKeywordIcons.length ? `<div class="status-stack-tr">
        ${activeKeywordIcons.map(k=>`<img class="kw-icon" src="images/${KEYWORD_ICON_FILES[k]}" title="${KEYWORD_LABELS[k]||k}">`).join('')}
      </div>` : ''}
    ${inPlay && opts.attackConfirmed ? `<div class="sword-icons confirmed"><img src="images/kw-attaque.png"></div>` : ''}
    ${card.foil ? `<div class="card-foil-layer"></div>` : ''}
  `;
  if(opts.onClick) el.onclick = opts.onClick;
  if(!opts.isPreview) attachHoverPreview(el, card);
  if(card.foil){
    el.classList.add('foil');
    el.addEventListener('mouseenter', ()=>triggerFoilSweep(el));
  }
  return el;
}
function triggerFoilSweep(el){
  el.classList.remove('foil-play');
  void el.offsetWidth;
  el.classList.add('foil-play');
}
setInterval(()=>{
  document.querySelectorAll('.card.foil:not(:hover)').forEach(triggerFoilSweep);
}, 10000);

function render(){
  renderHero('p1'); renderHero('p2');
  renderLane('p1'); renderLane('p2');
  renderZone('p1'); renderZone('p2');
  renderHand();
  renderPhaseBar();
  updateTip();
  renderGameOverOverlay();
  requestAnimationFrame(drawBlockArrows);
}

let matchCurrencyGranted = false;

function renderGameOverOverlay(){
  const overlay = document.getElementById('overlay');
  if(!S.gameOver){ overlay.classList.remove('show'); return; }
  document.getElementById('overlay-text').textContent = S.winnerKey==='p1' ? 'Victoire !' : 'Défaite...';
  overlay.classList.add('show');
  if(!matchCurrencyGranted){
    matchCurrencyGranted = true;
    grantMatchCurrency(S.winnerKey==='p1').then(result=>{
      if(result){
        const el = document.getElementById('overlay-currency');
        if(el) el.textContent = `+${result.amount} 🔶 (solde : ${result.balance})`;
      }
    });
  }
}

function drawBlockArrows(){
  const svg = document.getElementById('block-arrows-layer');
  if(!svg) return;
  svg.innerHTML = '';
  ['p1','p2'].forEach(defKey=>{
    const defP = S[defKey];
    if(!defP || !defP.blocks) return;
    Object.entries(defP.blocks).forEach(([attackerInstId, blockerInstId])=>{
      const attWrap = document.querySelector(`[data-inst-id="${attackerInstId}"]`);
      const blkWrap = document.querySelector(`[data-inst-id="${blockerInstId}"]`);
      if(!attWrap || !blkWrap) return;
      const a = attWrap.getBoundingClientRect();
      const b = blkWrap.getBoundingClientRect();
      const x1 = b.left + b.width/2, y1 = b.top + b.height/2;
      const x2 = a.left + a.width/2, y2 = a.top + a.height/2;
      const angle = Math.atan2(y2-y1, x2-x1);
      const shorten = 44;
      const ex = x2 - Math.cos(angle)*shorten, ey = y2 - Math.sin(angle)*shorten;

      const line = document.createElementNS('http://www.w3.org/2000/svg','line');
      line.setAttribute('x1', x1); line.setAttribute('y1', y1);
      line.setAttribute('x2', ex); line.setAttribute('y2', ey);
      line.setAttribute('class', 'block-arrow-line');
      svg.appendChild(line);

      const backX = x2 - Math.cos(angle)*20, backY = y2 - Math.sin(angle)*20;
      const perpX = Math.cos(angle+Math.PI/2)*8, perpY = Math.sin(angle+Math.PI/2)*8;
      const arrow = document.createElementNS('http://www.w3.org/2000/svg','polygon');
      arrow.setAttribute('points', `${ex+Math.cos(angle)*20},${ey+Math.sin(angle)*20} ${backX+perpX},${backY+perpY} ${backX-perpX},${backY-perpY}`);
      arrow.setAttribute('class', 'block-arrow-head');
      svg.appendChild(arrow);
    });
  });
}

function regionPreviewCard(region){
  return { type:'Région', name:region.name, class:region.class, text:region.text||'', rarity:'Commune', keywords:[],
    image:region.image||'', imagePosX:region.imagePosX, imagePosY:region.imagePosY, imageZoom:region.imageZoom };
}

function renderHero(key){
  const p = S[key];
  const hero = p.hero;
  const region = p.region;
  const el = document.getElementById(`hero-${key}`);

  const reservedAmount = p.hand.reduce((sum,c)=>c.pendingTrap ? sum+(c.reservedMana||0) : sum, 0);
  const normalDots = Array.from({length:p.manaNormalMax}, (_,i)=>{
    const filled = i<p.manaNormal;
    const reserved = filled && reservedAmount>0 && i >= (p.manaNormal - reservedAmount);
    return `<span class="mana-dot ${filled?'filled':'empty'}${reserved?' reserved':''}"></span>`;
  }).join('');
  const fragileDots = Array.from({length:p.manaFragile}, ()=>`<span class="mana-dot fragile"></span>`).join('');
  const regionThumbStyle = region.image ? `background-image:url('${region.image.replace(/'/g,"")}');background-position:${region.imagePosX}% ${region.imagePosY}%;background-size:${region.imageZoom>100?region.imageZoom+'%':'cover'};` : '';
  const heroPortraitStyle = hero.image ? `background-image:url('${hero.image.replace(/'/g,"")}');background-position:${hero.imagePosX}% ${hero.imagePosY}%;background-size:${hero.imageZoom>100?hero.imageZoom+'%':'cover'};` : '';

  el.innerHTML = `
    <div class="hero-top">
      <div class="hero-portrait" style="${heroPortraitStyle}">${hero.image ? '' : hero.name[0]}<span class="hp-badge">${p.hp}</span></div>
      <div class="hero-info">
        <div class="hero-name">${hero.name}</div>
        <div class="region-tag">${region.name}</div>
      </div>
      <div class="zone-badges">
        <div class="badge deck" title="Cartes restantes"><span class="badge-icon">🂠</span><span class="badge-count">${p.deck.length}</span><span class="badge-label">Deck</span></div>
        <div class="badge discard ${p.discard.length>0?'has-cards':''}" title="Défausse" onclick="openDiscardModal('${key}')"><span class="badge-icon">🪦</span><span class="badge-count">${p.discard.length}</span><span class="badge-label">Défausse</span></div>
      </div>
    </div>
    <div class="mana-bar">
      <div class="mana-region-thumb" id="region-thumb-${key}" style="${regionThumbStyle}" title="${region.name}"></div>
      <div class="mana-dots">${normalDots}${fragileDots}</div>
    </div>
  `;
  attachHoverPreview(document.getElementById(`region-thumb-${key}`), regionPreviewCard(region));

  if(key==='p1'){
    const btn = document.createElement('button');
    btn.className='power-btn';
    btn.textContent = hero.activeText;
    const needsT = effectNeedsTarget(hero.activeEffect);
    const usable = !!hero.activeEffect && availableMana(p)>=hero.activeCost && p.heroCooldown===0 && S.active==='p1' && S.phase==='main' && !S.gameOver;
    btn.disabled = !usable;
    btn.onclick = ()=>{
      if(needsT){ S.pendingCard = {isHeroPower:true}; beginTargeting(btn); updateTip(); }
      else useHeroPower('p1', {});
    };
    el.appendChild(btn);
  }
  if(S.pendingCard && targetableKeysForEffect(pendingTargetedEffect()).includes(key)){
    const eff = pendingTargetedEffect();
    const wantsHero = eff && (eff.type==='damage' || eff.type==='heal');
    if(wantsHero){
      el.style.cursor='crosshair';
      el.onclick = ()=>resolvePendingTarget({isHeroTarget:true, player:S[key], key});
    }
  }
}
